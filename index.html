<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DRILL Assistant — 메인화면</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/theme.js"></script>
</head>
<body class="flex h-screen overflow-hidden antialiased text-on-surface">
  <div id="app-shell"></div>

  <main id="app-main">
    <div class="min-h-full flex items-center justify-center p-margin">
      <div class="w-full max-w-[1200px]">
        <div class="text-center mb-xl">
          <h1 class="font-h1 text-h1 text-on-surface mb-sm">DRILL Assistant</h1>
          <p class="font-body-lg text-secondary">작업을 선택하세요</p>
        </div>

        <div class="grid grid-cols-3 gap-gutter">
          <a href="drill-point.html"
             class="group bg-surface-container-lowest border border-outline-variant rounded-xl p-xl flex flex-col items-center text-center hover:border-primary hover:shadow-[0_12px_32px_rgba(0,0,0,0.08)] hover:-translate-y-1 transition-all">
            <div class="w-20 h-20 rounded-xl bg-primary-fixed flex items-center justify-center mb-lg group-hover:bg-primary group-hover:text-on-primary text-primary transition-colors">
              <span class="material-symbols-outlined" style="font-size:40px;">precision_manufacturing</span>
            </div>
            <h2 class="font-h3 text-h3 text-on-surface mb-xs">드릴 포인트 수정</h2>
            <p class="font-body-sm text-secondary">사진 정렬 · DXF 비교</p>
          </a>

          <a href="drill-taper.html"
             class="group bg-surface-container-lowest border border-outline-variant rounded-xl p-xl flex flex-col items-center text-center hover:border-primary hover:shadow-[0_12px_32px_rgba(0,0,0,0.08)] hover:-translate-y-1 transition-all">
            <div class="w-20 h-20 rounded-xl bg-primary-fixed flex items-center justify-center mb-lg group-hover:bg-primary group-hover:text-on-primary text-primary transition-colors">
              <span class="material-symbols-outlined" style="font-size:40px;">straighten</span>
            </div>
            <h2 class="font-h3 text-h3 text-on-surface mb-xs">드릴 테이퍼 취합</h2>
            <p class="font-body-sm text-secondary">엑셀 측정값 정리 · 분석</p>
          </a>

          <a href="drill-code.html"
             class="group bg-surface-container-lowest border border-outline-variant rounded-xl p-xl flex flex-col items-center text-center hover:border-primary hover:shadow-[0_12px_32px_rgba(0,0,0,0.08)] hover:-translate-y-1 transition-all">
            <div class="w-20 h-20 rounded-xl bg-primary-fixed flex items-center justify-center mb-lg group-hover:bg-primary group-hover:text-on-primary text-primary transition-colors">
              <span class="material-symbols-outlined" style="font-size:40px;">terminal</span>
            </div>
            <h2 class="font-h3 text-h3 text-on-surface mb-xs">드릴 코드 생성</h2>
            <p class="font-body-sm text-secondary">ERP 코드 자동 생성</p>
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/shell.js"></script>
  <script>renderShell('dashboard');</script>
</body>
</html>
