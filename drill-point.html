<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DRILL Assistant — 드릴 포인트 수정</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/theme.js"></script>
</head>
<body class="flex h-screen overflow-hidden antialiased text-on-surface">
  <div id="app-shell"></div>

  <main id="app-main">
    <div class="p-lg flex flex-col gap-lg max-w-[1440px] mx-auto h-full">

      <!-- Top bar -->
      <div class="flex justify-between items-center bg-surface p-md rounded-xl border border-outline-variant shadow-sm">
        <div class="flex items-center gap-md">
          <h2 class="font-h3 text-on-surface">드릴 포인트 수정</h2>
          <span class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-sm">자동 정렬</span>
        </div>
        <div class="flex gap-sm">
          <label class="px-4 py-2 border border-outline text-on-surface rounded-lg font-label-md hover:bg-surface-variant transition-colors flex items-center gap-2 cursor-pointer">
            <input id="file-input" type="file" accept="image/*" multiple class="hidden"/>
            <span class="material-symbols-outlined text-[18px]">add_photo_alternate</span>
            사진 업로드
          </label>
          <button id="btn-download" disabled class="px-4 py-2 border border-outline text-on-surface rounded-lg font-label-md hover:bg-surface-variant transition-colors flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
            <span class="material-symbols-outlined text-[18px]">download</span>
            현재 다운로드
          </button>
          <button id="btn-download-all" disabled class="px-4 py-2 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary-container transition-colors flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
            <span class="material-symbols-outlined text-[18px]">download_done</span>
            <span id="download-all-label">전체 저장</span>
          </button>
        </div>
      </div>

      <!-- Main layout -->
      <div class="flex-1 grid grid-cols-12 gap-lg min-h-0">

        <!-- Left: file list -->
        <div class="col-span-3 bg-surface p-md rounded-xl border border-outline-variant shadow-sm flex flex-col overflow-hidden">
          <div class="flex justify-between items-center mb-sm">
            <h3 class="font-label-md text-on-surface flex items-center gap-2">
              <span class="material-symbols-outlined text-[18px]">photo_library</span>
              사진 목록
            </h3>
            <span id="file-count" class="font-label-sm text-secondary">0</span>
          </div>
          <div id="file-list" class="flex-1 overflow-y-auto scrollbar-thin -mr-2 pr-2 flex flex-col gap-2">
            <div id="empty-list" class="text-center text-secondary text-body-sm p-lg">
              <span class="material-symbols-outlined text-[48px] text-outline mb-2 block">image</span>
              사진을 업로드하세요.<br/>여러 장 한번에 가능합니다.
            </div>
          </div>
        </div>

        <!-- Center: canvas -->
        <div class="col-span-6 bg-surface p-md rounded-xl border border-outline-variant shadow-sm flex flex-col">
          <div class="flex justify-between items-center mb-md pb-md border-b border-outline-variant gap-md">
            <div class="flex items-center gap-2 shrink-0">
              <button id="btn-toggle" class="flex items-center gap-1 px-3 py-1.5 text-on-surface bg-secondary-container rounded font-label-sm whitespace-nowrap shrink-0 min-w-[92px] justify-center">
                <span class="material-symbols-outlined text-[18px]">visibility</span>
                <span id="toggle-label">정렬 후</span>
              </button>
              <button id="btn-crosshair" class="flex items-center gap-1 px-3 py-1.5 text-secondary border border-outline-variant rounded font-label-sm hover:bg-surface-variant whitespace-nowrap shrink-0 min-w-[104px] justify-center">
                <span class="material-symbols-outlined text-[18px]">add</span>
                <span id="crosshair-label">십자선 끄기</span>
              </button>
              <button id="btn-dxf-toggle" class="flex items-center gap-1 px-3 py-1.5 text-secondary border border-outline-variant rounded font-label-sm hover:bg-surface-variant whitespace-nowrap shrink-0 min-w-[104px] justify-center disabled:opacity-40 disabled:cursor-not-allowed" disabled title="단축키: D">
                <span class="material-symbols-outlined text-[18px]">architecture</span>
                <span id="dxf-toggle-label">DXF (D)</span>
              </button>
              <button id="btn-pick" class="flex items-center gap-1 px-3 py-1.5 text-secondary border border-outline-variant rounded font-label-sm hover:bg-surface-variant whitespace-nowrap shrink-0 min-w-[170px] justify-center" title="단축키: Space">
                <span class="material-symbols-outlined text-[18px]">touch_app</span>
                <span id="pick-label">두 점으로 정렬 (Space)</span>
              </button>
            </div>
            <div id="meta" class="font-label-sm text-secondary truncate min-w-0"></div>
          </div>
          <div class="flex-1 bg-surface-container-lowest rounded-lg border border-outline-variant overflow-hidden flex items-center justify-center relative">
            <canvas id="canvas" class="max-w-full max-h-full"></canvas>
            <div id="canvas-empty" class="absolute inset-0 flex flex-col items-center justify-center text-secondary pointer-events-none">
              <span class="material-symbols-outlined text-[64px] text-outline mb-2">image</span>
              <p class="font-body-md">사진을 업로드하면 미리보기가 표시됩니다.</p>
            </div>
          </div>
        </div>

        <!-- Right: settings -->
        <div class="col-span-3 bg-surface p-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-lg overflow-y-auto">
          <h3 class="font-label-md text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">tune</span>
            정렬 설정
          </h3>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">회전 각도 (°)</label>
            <input id="angle-slider" type="range" min="-45" max="45" step="0.1" value="0"
                   class="w-full h-1 bg-surface-variant rounded-lg appearance-none cursor-pointer accent-primary disabled:opacity-40" disabled/>
            <div class="flex items-center gap-1 mt-2">
              <input id="angle" type="number" step="0.05" value="0" placeholder="0.00"
                     class="flex-1 px-2 py-2 border border-outline-variant rounded bg-surface-container-lowest text-body-sm font-code text-center focus:outline-none focus:border-primary disabled:opacity-40" disabled/>
              <button id="btn-reset" class="px-3 py-2 border border-outline-variant rounded text-secondary text-body-sm hover:bg-surface-variant disabled:opacity-40" disabled title="0°로 초기화">초기화</button>
            </div>
            <p class="font-body-sm text-secondary text-[11px] mt-1">슬라이더로 조절하거나 직접 입력 (Enter)</p>
          </div>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">배경색 (빈 모서리)</label>
            <input id="bg-color" type="color" value="#000000" class="w-full h-9 rounded border border-outline-variant cursor-pointer disabled:opacity-40" disabled/>
            <p class="font-body-sm text-secondary text-[11px] mt-1">기본은 사진 코너 색을 자동으로 따라갑니다</p>
          </div>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">저장 폴더</label>
            <div class="flex flex-col gap-1">
              <button id="btn-pick-folder" class="px-3 py-2 border border-outline-variant rounded text-on-surface text-body-sm hover:bg-surface-variant flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[18px]">folder_open</span>
                <span id="folder-btn-label">폴더 선택</span>
              </button>
              <p id="folder-name" class="font-body-sm text-secondary text-[11px] truncate">미선택 — 다운로드 폴더로 저장됩니다</p>
            </div>
          </div>

          <div class="border-t border-outline-variant pt-md">
            <h3 class="font-label-md text-on-surface flex items-center gap-2 mb-sm">
              <span class="material-symbols-outlined text-[18px]">architecture</span>
              DXF 비교
            </h3>
            <label class="px-3 py-2 border border-outline-variant rounded text-on-surface text-body-sm hover:bg-surface-variant flex items-center justify-center gap-1 cursor-pointer mb-1">
              <input id="dxf-input" type="file" accept=".dxf,.dwg" class="hidden"/>
              <span class="material-symbols-outlined text-[18px]">upload_file</span>
              <span id="dxf-file-btn">DXF / DWG 파일 선택</span>
            </label>
            <p id="dxf-file-name" class="font-body-sm text-secondary text-[11px] truncate mb-2">파일 없음</p>

            <div class="flex items-center justify-between mb-1">
              <label class="font-label-sm text-on-surface">크기</label>
              <span id="dxf-scale-val" class="font-code text-label-sm text-secondary">1.00x</span>
            </div>
            <input id="dxf-scale" type="range" min="0.1" max="50" step="0.05" value="1" disabled
                   class="w-full h-1 bg-surface-variant rounded-lg appearance-none cursor-pointer accent-primary disabled:opacity-40"/>

            <div class="flex items-center justify-between mb-1 mt-2">
              <label class="font-label-sm text-on-surface">회전 (°)</label>
              <span id="dxf-rot-val" class="font-code text-label-sm text-secondary">0.0</span>
            </div>
            <input id="dxf-rot" type="range" min="-180" max="180" step="0.1" value="0" disabled
                   class="w-full h-1 bg-surface-variant rounded-lg appearance-none cursor-pointer accent-primary disabled:opacity-40"/>

            <div class="flex items-center justify-between mt-2 gap-2">
              <label class="font-label-sm text-on-surface">색상</label>
              <input id="dxf-color" type="color" value="#e53935" class="w-16 h-7 rounded border border-outline-variant cursor-pointer"/>
            </div>

            <button id="btn-dxf-reset" disabled class="mt-2 px-3 py-1.5 border border-outline-variant rounded text-secondary text-body-sm hover:bg-surface-variant disabled:opacity-40 w-full">위치/크기 초기화</button>
            <p class="font-body-sm text-secondary text-[11px] mt-1">캔버스 드래그로 이동, 휠로 크기 조절</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/shell.js"></script>
  <script src="assets/align.js"></script>
  <script src="assets/dxf.js"></script>
  <script>
    renderShell('drill-point');

    // App state
    const state = {
      items: [],         // [{name, image, threshold, autoAngle, angle, bg}]
      activeIdx: -1,
      showOriginal: false,
      showCrosshair: true,
      saveDir: null,     // FileSystemDirectoryHandle (Chromium only)
      pickMode: false,
      pickedPoints: [],  // up to 2 points in canvas pixel coords
      dxf: null,         // parsed { entities, bbox }
      dxfName: '',
      dxfVisible: false,
      dxfScaleUser: 1,   // multiplier on top of fit-scale
      dxfOffsetX: 0,     // canvas pixels from center
      dxfOffsetY: 0,
      dxfRotationDeg: 0,
      dxfColor: '#e53935',
      dxfFitScale: 1,    // computed on load + canvas resize
      dxfDragging: false,
      dxfDragStart: null,
    };

    // DOM
    const $ = (id) => document.getElementById(id);
    const fileInput = $('file-input');
    const fileList = $('file-list');
    const emptyList = $('empty-list');
    const canvas = $('canvas');
    const canvasEmpty = $('canvas-empty');

    // Offscreen canvas caches the rendered rotated image so mousemove
    // only redraws the overlay (points + dashed line), not the image.
    const imageCache = document.createElement('canvas');
    const angleInput = $('angle');
    const angleSlider = $('angle-slider');
    const bgColorInput = $('bg-color');
    const meta = $('meta');
    const btnDownload = $('btn-download');
    const btnDownloadAll = $('btn-download-all');
    const downloadAllLabel = $('download-all-label');
    const btnReset = $('btn-reset');
    const btnToggle = $('btn-toggle');
    const toggleLabel = $('toggle-label');
    const btnCrosshair = $('btn-crosshair');
    const crosshairLabel = $('crosshair-label');
    const btnPick = $('btn-pick');
    const pickLabel = $('pick-label');
    const btnPickFolder = $('btn-pick-folder');
    const folderName = $('folder-name');
    const folderBtnLabel = $('folder-btn-label');
    const fileCount = $('file-count');

    // DXF
    const dxfInput = $('dxf-input');
    const dxfFileName = $('dxf-file-name');
    const dxfFileBtn = $('dxf-file-btn');
    const btnDxfToggle = $('btn-dxf-toggle');
    const dxfToggleLabel = $('dxf-toggle-label');
    const dxfScaleInput = $('dxf-scale');
    const dxfScaleVal = $('dxf-scale-val');
    const dxfRotInput = $('dxf-rot');
    const dxfRotVal = $('dxf-rot-val');
    const dxfColorInput = $('dxf-color');
    const btnDxfReset = $('btn-dxf-reset');

    function drawCrosshair() {
      if (!state.showCrosshair) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      ctx.save();
      ctx.strokeStyle = '#e53935';
      ctx.lineWidth = Math.max(1, Math.round((window.devicePixelRatio || 1) * 1.2));
      ctx.beginPath();
      ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2);
      ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.restore();
    }

    function drawPickedPoints() {
      if (state.pickedPoints.length === 0) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      ctx.save();
      ctx.fillStyle = '#1976d2';
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2 * dpr;
      state.pickedPoints.forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 7 * dpr, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = `${11 * dpr}px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(i + 1), p.x, p.y);
        ctx.fillStyle = '#1976d2';
      });
      // Connecting line if 1 dot already placed
      if (state.pickedPoints.length === 1 && state.lastMouse) {
        const p = state.pickedPoints[0];
        ctx.strokeStyle = '#1976d2';
        ctx.setLineDash([4 * dpr, 4 * dpr]);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(state.lastMouse.x, state.lastMouse.y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function setEnabled() {
      const hasActive = state.activeIdx >= 0;
      const has = state.items.length > 0;
      btnDownload.disabled = !hasActive;
      btnDownloadAll.disabled = !has;
      btnReset.disabled = !hasActive;
      angleInput.disabled = !hasActive;
      angleSlider.disabled = !hasActive;
      bgColorInput.disabled = !hasActive;
    }

    function fitCanvas() {
      // Match canvas pixel size to its parent display size for crisp rendering.
      const parent = canvas.parentElement;
      const r = parent.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const newW = Math.max(1, Math.floor(r.width * dpr));
      const newH = Math.max(1, Math.floor(r.height * dpr));
      canvas.style.width = '100%';
      canvas.style.height = '100%';
      // Only resize the buffer if dimensions actually changed — resizing
      // clears and triggers a reflow, which caused image jitter on mousemove.
      const changed = (canvas.width !== newW || canvas.height !== newH);
      if (changed) {
        canvas.width = newW; canvas.height = newH;
        imageCache.width = newW; imageCache.height = newH;
        computeDxfFitScale();
      }
      return changed;
    }

    function renderImageCache() {
      const it = state.items[state.activeIdx]; if (!it) return;
      const angle = state.showOriginal ? 0 : it.angle;
      DrillAlign.renderRotated(it.image, imageCache, angle, it.bg);
    }

    function computeDxfFitScale() {
      if (!state.dxf || !state.dxf.bbox) { state.dxfFitScale = 1; return; }
      const { w: bw, h: bh } = state.dxf.bbox;
      const W = canvas.width, H = canvas.height;
      // Fit DXF bbox to 70% of the smaller canvas dimension
      const fit = 0.7 * Math.min(W / bw, H / bh);
      state.dxfFitScale = isFinite(fit) && fit > 0 ? fit : 1;
    }

    function drawDxfOverlay() {
      if (!state.dxf || !state.dxfVisible) return;
      const dpr = window.devicePixelRatio || 1;
      const ctx = canvas.getContext('2d');
      const placement = {
        cx: canvas.width / 2 + state.dxfOffsetX,
        cy: canvas.height / 2 + state.dxfOffsetY,
        scale: state.dxfFitScale * state.dxfScaleUser,
        rotationRad: state.dxfRotationDeg * Math.PI / 180,
        color: state.dxfColor,
        lineWidth: Math.max(1, 1.5 * dpr),
        alpha: 0.9,
      };
      DrillDXF.drawDXF(ctx, state.dxf, placement);
    }

    function blitAndOverlay() {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(imageCache, 0, 0);
      drawCrosshair();
      drawDxfOverlay();
      drawPickedPoints();
    }

    function renderActive() {
      const it = state.items[state.activeIdx];
      if (!it) {
        canvasEmpty.style.display = 'flex';
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        meta.textContent = '';
        return;
      }
      canvasEmpty.style.display = 'none';
      fitCanvas();
      renderImageCache();
      blitAndOverlay();
      const picking = state.pickMode
        ? `· 두 점 선택 중 (${state.pickedPoints.length}/2)`
        : '';
      meta.textContent = `${it.image.naturalWidth} × ${it.image.naturalHeight} · ${it.name} ${picking}`;
      angleInput.value = it.angle.toFixed(2);
      angleSlider.value = it.angle.toFixed(2);
      bgColorInput.value = rgbToHex(it.bg);
    }

    function rgbToHex(css) {
      const m = css.match(/\d+/g);
      if (!m) return '#000000';
      const [r, g, b] = m.map(Number);
      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }
    function hexToCss(hex) {
      const m = hex.replace('#', '').match(/../g);
      if (!m) return 'rgb(0,0,0)';
      const [r, g, b] = m.map(h => parseInt(h, 16));
      return `rgb(${r},${g},${b})`;
    }

    function renderFileList() {
      emptyList.style.display = state.items.length ? 'none' : 'block';
      // Remove all but the empty state element
      Array.from(fileList.children).forEach(c => { if (c !== emptyList) c.remove(); });
      state.items.forEach((it, i) => {
        const row = document.createElement('div');
        row.className = 'group flex items-center gap-2 p-2 rounded-lg border transition-colors '
          + (i === state.activeIdx
            ? 'border-primary bg-primary-fixed'
            : 'border-outline-variant hover:bg-surface-container');
        row.innerHTML = `
          <button class="item-select flex items-center gap-2 flex-1 min-w-0 text-left cursor-pointer">
            <div class="w-12 h-12 rounded bg-surface-container border border-outline-variant overflow-hidden flex items-center justify-center shrink-0">
              <img src="${it.thumb}" class="w-full h-full object-cover"/>
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-label-sm text-on-surface text-[12px] truncate">${it.name}</p>
              <p class="font-code text-[11px] ${it.angle === 0 ? 'text-secondary' : 'text-primary'}">${it.angle.toFixed(2)}°</p>
            </div>
          </button>
          <button class="item-remove p-1 rounded text-secondary hover:bg-error-container hover:text-on-error-container opacity-0 group-hover:opacity-100 transition-opacity" title="목록에서 제거">
            <span class="material-symbols-outlined text-[18px]">close</span>
          </button>`;
        row.querySelector('.item-select').addEventListener('click', () => {
          state.activeIdx = i;
          renderFileList();
          renderActive();
        });
        row.querySelector('.item-remove').addEventListener('click', (e) => {
          e.stopPropagation();
          removeItem(i);
        });
        fileList.appendChild(row);
      });
      fileCount.textContent = state.items.length;
    }

    function removeItem(idx) {
      if (idx < 0 || idx >= state.items.length) return;
      state.items.splice(idx, 1);
      if (state.items.length === 0) {
        state.activeIdx = -1;
      } else if (state.activeIdx === idx) {
        state.activeIdx = Math.min(idx, state.items.length - 1);
      } else if (state.activeIdx > idx) {
        state.activeIdx--;
      }
      state.pickedPoints = [];
      setEnabled();
      renderFileList();
      renderActive();
    }

    function makeThumb(image) {
      const w = 96, h = 96;
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);
      const iw = image.naturalWidth, ih = image.naturalHeight;
      const scale = Math.min(w / iw, h / ih);
      const dw = iw * scale, dh = ih * scale;
      ctx.drawImage(image, (w - dw) / 2, (h - dh) / 2, dw, dh);
      return cv.toDataURL('image/jpeg', 0.6);
    }

    async function loadFiles(fileList) {
      const arr = Array.from(fileList).filter(f => f.type.startsWith('image/'));
      for (const f of arr) {
        const url = URL.createObjectURL(f);
        const image = new Image();
        await new Promise((res, rej) => {
          image.onload = res;
          image.onerror = rej;
          image.src = url;
        });
        const id = DrillAlign.imageData(image);
        const bg = DrillAlign.sampleBg(id.data, id.width, id.height);
        state.items.push({
          name: f.name,
          image,
          imageData: id,
          threshold: 220,
          autoAngle: 0,
          angle: 0,
          bg: bg.css,
          brightCount: 0,
          thumb: makeThumb(image),
        });
      }
      if (state.activeIdx < 0 && state.items.length > 0) state.activeIdx = 0;
      setEnabled();
      renderFileList();
      renderActive();
    }

    // ---- Events ----
    fileInput.addEventListener('change', (e) => {
      loadFiles(e.target.files);
      fileInput.value = '';
    });

    function commitAngle(value) {
      const it = state.items[state.activeIdx]; if (!it) return;
      let a = parseFloat(value);
      if (isNaN(a)) a = 0;
      a = Math.max(-180, Math.min(180, a));
      it.angle = a;
      angleInput.value = a.toFixed(2);
      angleSlider.value = a.toFixed(2);
      renderFileList();
      renderActive();
    }

    angleSlider.addEventListener('input', (e) => commitAngle(e.target.value));
    angleInput.addEventListener('change', (e) => commitAngle(e.target.value));
    angleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commitAngle(e.target.value); }
    });

    // Override slider's default arrow-key step (which uses step="0.05") to 0.1°
    angleSlider.addEventListener('keydown', (e) => {
      const it = state.items[state.activeIdx]; if (!it) return;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
        e.preventDefault(); commitAngle(it.angle - 0.1);
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
        e.preventDefault(); commitAngle(it.angle + 0.1);
      }
    });

    // Global arrow keys also nudge angle by 0.1° (skip when typing in inputs)
    document.addEventListener('keydown', (e) => {
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      const it = state.items[state.activeIdx]; if (!it) return;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
        e.preventDefault(); commitAngle(it.angle - 0.1);
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
        e.preventDefault(); commitAngle(it.angle + 0.1);
      }
    });

    bgColorInput.addEventListener('input', (e) => {
      const it = state.items[state.activeIdx]; if (!it) return;
      it.bg = hexToCss(e.target.value);
      renderActive();
    });

    btnReset.addEventListener('click', () => {
      const it = state.items[state.activeIdx]; if (!it) return;
      it.angle = 0;
      renderFileList();
      renderActive();
    });

    btnToggle.addEventListener('click', () => {
      state.showOriginal = !state.showOriginal;
      toggleLabel.textContent = state.showOriginal ? '원본' : '정렬 후';
      renderActive();
    });

    btnCrosshair.addEventListener('click', () => {
      state.showCrosshair = !state.showCrosshair;
      crosshairLabel.textContent = state.showCrosshair ? '십자선 끄기' : '십자선 켜기';
      btnCrosshair.classList.toggle('bg-secondary-container', state.showCrosshair);
      btnCrosshair.classList.toggle('text-on-surface', state.showCrosshair);
      btnCrosshair.classList.toggle('border', !state.showCrosshair);
      btnCrosshair.classList.toggle('text-secondary', !state.showCrosshair);
      renderActive();
    });

    // Initialize crosshair button visual state to match showCrosshair = true
    btnCrosshair.classList.add('bg-secondary-container', 'text-on-surface');
    btnCrosshair.classList.remove('border', 'text-secondary');

    function setPickMode(on) {
      state.pickMode = on;
      state.pickedPoints = [];
      pickLabel.textContent = on ? '취소' : '두 점으로 정렬';
      btnPick.classList.toggle('bg-secondary-container', on);
      btnPick.classList.toggle('text-on-surface', on);
      btnPick.classList.toggle('border', !on);
      btnPick.classList.toggle('text-secondary', !on);
      canvas.style.cursor = on ? 'crosshair' : '';
      renderActive();
    }

    btnPick.addEventListener('click', () => setPickMode(!state.pickMode));

    function getCanvasCoord(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height),
      };
    }

    canvas.addEventListener('mousemove', (e) => {
      if (!state.pickMode || state.pickedPoints.length !== 1) return;
      state.lastMouse = getCanvasCoord(e);
      // Only the overlay needs updating — image is cached and stays still.
      blitAndOverlay();
    });

    canvas.addEventListener('click', (e) => {
      if (!state.pickMode) return;
      const it = state.items[state.activeIdx]; if (!it) return;
      const p = getCanvasCoord(e);
      state.pickedPoints.push(p);
      if (state.pickedPoints.length === 2) {
        const [p1, p2] = state.pickedPoints;
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        if (Math.hypot(dx, dy) < 4) {
          state.pickedPoints.pop(); // ignore double-click on same spot
          renderActive();
          return;
        }
        const deltaDeg = Math.atan2(dy, dx) * 180 / Math.PI;
        commitAngle(it.angle + deltaDeg);
        setPickMode(false);
        return;
      }
      renderActive();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && state.pickMode) { setPickMode(false); return; }
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      // Space toggles two-point pick mode
      if (e.code === 'Space' || e.key === ' ') {
        if (state.activeIdx < 0) return;
        e.preventDefault();
        setPickMode(!state.pickMode);
        return;
      }
      // D toggles DXF overlay
      if (e.key === 'd' || e.key === 'D' || e.key === 'ㅇ') {
        if (!state.dxf) return;
        e.preventDefault();
        setDxfVisible(!state.dxfVisible);
      }
    });

    // ===== DXF integration =====
    function setDxfVisible(on) {
      state.dxfVisible = on;
      dxfToggleLabel.textContent = on ? 'DXF 켜짐 (D)' : 'DXF (D)';
      btnDxfToggle.classList.toggle('bg-secondary-container', on);
      btnDxfToggle.classList.toggle('text-on-surface', on);
      btnDxfToggle.classList.toggle('border', !on);
      btnDxfToggle.classList.toggle('text-secondary', !on);
      blitAndOverlay();
    }

    function refreshDxfControls() {
      const has = !!state.dxf;
      btnDxfToggle.disabled = !has;
      dxfScaleInput.disabled = !has;
      dxfRotInput.disabled = !has;
      btnDxfReset.disabled = !has;
      dxfScaleInput.value = state.dxfScaleUser;
      dxfScaleVal.textContent = state.dxfScaleUser.toFixed(2) + 'x';
      dxfRotInput.value = state.dxfRotationDeg;
      dxfRotVal.textContent = state.dxfRotationDeg.toFixed(1);
      dxfColorInput.value = state.dxfColor;
    }

    function isBinaryDWG(buf) {
      // DWG files start with "AC" + 4-char version code (e.g., AC1027)
      if (buf.length < 6) return false;
      return buf[0] === 0x41 && buf[1] === 0x43; // 'A','C'
    }

    dxfInput.addEventListener('change', async (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      const lname = f.name.toLowerCase();
      // Sniff first bytes — handles files mis-labelled by extension.
      const headBuf = new Uint8Array(await f.slice(0, 8).arrayBuffer());
      const looksDwg = lname.endsWith('.dwg') || isBinaryDWG(headBuf);
      if (looksDwg) {
        dxfFileName.innerHTML =
          'DWG는 브라우저에서 직접 열 수 없어요.<br/>' +
          '<a href="https://cloudconvert.com/dwg-to-dxf" target="_blank" class="underline">DXF로 변환</a>해서 다시 올려주세요.';
        dxfFileName.classList.add('text-error');
        state.dxf = null;
        refreshDxfControls();
        dxfInput.value = '';
        blitAndOverlay();
        return;
      }
      const text = await f.text();
      try {
        const dxf = DrillDXF.parseDXF(text);
        if (!dxf.entities.length || !dxf.bbox) {
          dxfFileName.textContent = '읽을 수 있는 엔티티가 없습니다';
          dxfFileName.classList.add('text-error');
          state.dxf = null;
        } else {
          state.dxf = dxf;
          state.dxfName = f.name;
          state.dxfOffsetX = 0;
          state.dxfOffsetY = 0;
          state.dxfScaleUser = 1;
          state.dxfRotationDeg = 0;
          computeDxfFitScale();
          dxfFileName.textContent = `${f.name} (${dxf.entities.length}개 엔티티)`;
          dxfFileName.classList.remove('text-error');
          setDxfVisible(true);
        }
      } catch (err) {
        console.warn(err);
        dxfFileName.textContent = '파싱 실패: ' + err.message;
        dxfFileName.classList.add('text-error');
      }
      dxfInput.value = '';
      refreshDxfControls();
      blitAndOverlay();
    });

    btnDxfToggle.addEventListener('click', () => {
      if (!state.dxf) return;
      setDxfVisible(!state.dxfVisible);
    });

    dxfScaleInput.addEventListener('input', (e) => {
      state.dxfScaleUser = parseFloat(e.target.value);
      dxfScaleVal.textContent = state.dxfScaleUser.toFixed(2) + 'x';
      blitAndOverlay();
    });

    dxfRotInput.addEventListener('input', (e) => {
      state.dxfRotationDeg = parseFloat(e.target.value);
      dxfRotVal.textContent = state.dxfRotationDeg.toFixed(1);
      blitAndOverlay();
    });

    dxfColorInput.addEventListener('input', (e) => {
      state.dxfColor = e.target.value;
      blitAndOverlay();
    });

    btnDxfReset.addEventListener('click', () => {
      state.dxfOffsetX = 0;
      state.dxfOffsetY = 0;
      state.dxfScaleUser = 1;
      state.dxfRotationDeg = 0;
      refreshDxfControls();
      blitAndOverlay();
    });

    // Drag DXF with mouse when overlay is visible and pick mode is off
    canvas.addEventListener('mousedown', (e) => {
      if (state.pickMode || !state.dxfVisible || !state.dxf) return;
      const p = getCanvasCoord(e);
      state.dxfDragging = true;
      state.dxfDragStart = { x: p.x, y: p.y, ox: state.dxfOffsetX, oy: state.dxfOffsetY };
      canvas.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', (e) => {
      if (!state.dxfDragging) return;
      const p = getCanvasCoord(e);
      state.dxfOffsetX = state.dxfDragStart.ox + (p.x - state.dxfDragStart.x);
      state.dxfOffsetY = state.dxfDragStart.oy + (p.y - state.dxfDragStart.y);
      blitAndOverlay();
    });
    window.addEventListener('mouseup', () => {
      if (!state.dxfDragging) return;
      state.dxfDragging = false;
      canvas.style.cursor = state.pickMode ? 'crosshair' : '';
    });

    // Wheel to scale DXF (only when visible and pick mode off)
    canvas.addEventListener('wheel', (e) => {
      if (state.pickMode || !state.dxfVisible || !state.dxf) return;
      e.preventDefault();
      const factor = Math.exp(-e.deltaY * 0.001);
      state.dxfScaleUser = Math.max(0.05, Math.min(50, state.dxfScaleUser * factor));
      refreshDxfControls();
      blitAndOverlay();
    }, { passive: false });

    async function saveBlobToFolder(blob, filename) {
      if (state.saveDir) {
        try {
          const handle = await state.saveDir.getFileHandle(filename, { create: true });
          const writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();
          return true;
        } catch (err) {
          console.warn('Folder write failed, falling back to download:', err);
        }
      }
      // Fallback: trigger browser download (lands in default Downloads folder)
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      return false;
    }

    async function exportItem(it) {
      const cv = DrillAlign.exportRotated(it.image, it.angle, it.bg);
      const ext = (it.name.match(/\.[^.]+$/) || ['.png'])[0];
      const stem = it.name.slice(0, it.name.length - ext.length);
      // Match input format: PNG for .png inputs, JPEG otherwise.
      const isJpeg = /^\.jpe?g$/i.test(ext);
      const mime = isJpeg ? 'image/jpeg' : 'image/png';
      const blob = await new Promise(res => cv.toBlob(res, mime, isJpeg ? 0.95 : undefined));
      const filename = stem + '@' + ext;
      return { blob, filename };
    }

    btnDownload.addEventListener('click', async () => {
      const it = state.items[state.activeIdx]; if (!it) return;
      const { blob, filename } = await exportItem(it);
      const savedToFolder = await saveBlobToFolder(blob, filename);
      const span = btnDownload.querySelector('span:last-child');
      if (span) {
        span.textContent = savedToFolder ? '저장됨!' : '다운로드됨';
        setTimeout(() => { span.textContent = '현재 다운로드'; }, 1500);
      }
    });

    btnDownloadAll.addEventListener('click', async () => {
      if (state.items.length === 0) return;
      btnDownloadAll.disabled = true;
      let done = 0, failed = 0;
      for (const it of state.items) {
        downloadAllLabel.textContent = `저장 중… (${done + 1}/${state.items.length})`;
        try {
          const { blob, filename } = await exportItem(it);
          const ok = await saveBlobToFolder(blob, filename);
          if (!ok && !state.saveDir) {
            // Space out browser-triggered downloads so the browser doesn't
            // discard them or pop the "allow multiple downloads" prompt late.
            await new Promise(r => setTimeout(r, 250));
          }
          done++;
        } catch (err) {
          console.warn('Export failed for', it.name, err);
          failed++;
        }
      }
      downloadAllLabel.textContent = failed
        ? `완료: ${done}개 (실패 ${failed})`
        : `완료: ${done}개`;
      setTimeout(() => {
        downloadAllLabel.textContent = '전체 저장';
        setEnabled();
      }, 2000);
    });

    btnPickFolder.addEventListener('click', async () => {
      if (!('showDirectoryPicker' in window)) {
        folderName.textContent = '이 브라우저는 폴더 선택을 지원하지 않습니다 (Chrome/Edge 권장)';
        folderName.classList.remove('text-secondary');
        folderName.classList.add('text-error');
        return;
      }
      try {
        const dir = await window.showDirectoryPicker({ mode: 'readwrite' });
        state.saveDir = dir;
        folderName.textContent = '📁 ' + dir.name;
        folderName.classList.remove('text-error', 'text-secondary');
        folderName.classList.add('text-on-surface');
        folderBtnLabel.textContent = '폴더 변경';
      } catch (err) {
        // User canceled — no-op
      }
    });

    // Drag & drop
    document.addEventListener('dragover', (e) => { e.preventDefault(); });
    document.addEventListener('drop', (e) => {
      e.preventDefault();
      if (e.dataTransfer?.files?.length) loadFiles(e.dataTransfer.files);
    });

    window.addEventListener('resize', renderActive);
    setEnabled();
    fitCanvas();
  </script>
</body>
</html>
