<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DRILL Assistant — 드릴 코드 수정</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/theme.js"></script>
</head>
<body class="flex h-screen overflow-hidden antialiased text-on-surface">
  <div id="app-shell"></div>

  <main id="app-main">
    <div class="p-lg flex flex-col gap-lg max-w-[1800px] mx-auto h-full w-full">

      <!-- Top bar -->
      <div class="flex justify-between items-center bg-surface p-md rounded-xl border border-outline-variant shadow-sm gap-md flex-wrap">
        <div class="flex items-center gap-md">
          <div class="flex gap-1 bg-surface-container rounded-lg p-1">
            <a href="drill-code.html" class="px-3 py-1.5 text-secondary hover:text-on-surface rounded font-label-sm flex items-center gap-1">
              <span class="material-symbols-outlined text-[18px]">terminal</span>
              코드 생성
            </a>
            <a href="drill-code-edit.html" class="px-3 py-1.5 bg-surface-container-lowest text-on-surface rounded font-label-sm shadow-sm flex items-center gap-1">
              <span class="material-symbols-outlined text-[18px]">edit_note</span>
              코드 수정
            </a>
          </div>
          <span class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-sm">규격 생성</span>
        </div>
        <div class="flex gap-sm">
          <button id="btn-clear" class="px-4 py-2 border border-outline text-on-surface rounded-lg font-label-md hover:bg-error-container hover:text-on-error-container hover:border-error transition-colors flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">refresh</span>
            입력 초기화
          </button>
        </div>
      </div>

      <!-- Main layout -->
      <div class="flex-1 grid grid-cols-12 gap-lg min-h-0">

        <!-- Left: input -->
        <div class="col-span-5 bg-surface p-lg rounded-xl border border-outline-variant shadow-sm flex flex-col gap-md overflow-y-auto">
          <h3 class="font-h3 text-[18px] text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary">edit_note</span>
            품명 입력
          </h3>

          <div>
            <label for="in-pumbun" class="font-label-md text-on-surface-variant block mb-1">품명</label>
            <input id="in-pumbun" type="text" autocomplete="off" spellcheck="false"
                   class="w-full px-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-h3 font-code focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"/>
            <p class="font-body-sm text-secondary text-[12px] mt-2">임의의 품명을 입력하면 우측에 그에 맞는 규격이 생성됩니다.</p>
          </div>
        </div>

        <!-- Right: generated 규격 -->
        <div class="col-span-7 bg-surface p-lg rounded-xl border border-outline-variant shadow-sm flex flex-col gap-md overflow-y-auto">
          <h3 class="font-h3 text-[18px] text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary">description</span>
            생성된 규격
          </h3>

          <div id="out-list" class="grid grid-cols-1 gap-md"></div>

          <div id="out-empty" class="flex-1 flex flex-col items-center justify-center text-secondary text-center">
            <span class="material-symbols-outlined text-[64px] text-outline mb-2">description</span>
            <p class="font-body-md">품명을 입력하면 규격이 여기에 표시됩니다.</p>
            <p class="font-body-sm text-[12px] text-outline mt-1">(규격 생성 로직은 다음 단계에서 추가됩니다.)</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/shell.js"></script>
  <script>
    renderShell('drill-code');

    const inPumbun = document.getElementById('in-pumbun');
    const btnClear = document.getElementById('btn-clear');
    const outEmpty = document.getElementById('out-empty');
    const outList  = document.getElementById('out-list');

    function recalc() {
      // Placeholder: 규격 생성 로직은 다음 지시에서 추가
      const pumbun = inPumbun.value.trim();
      if (!pumbun) {
        outList.innerHTML = '';
        outEmpty.classList.remove('hidden');
        return;
      }
      outEmpty.classList.add('hidden');
      outList.innerHTML = `
        <div class="border border-outline-variant rounded-xl p-md bg-surface-container-lowest">
          <p class="font-label-sm text-secondary mb-1">현재 입력</p>
          <p class="font-code text-h3 text-on-surface">${pumbun.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}</p>
        </div>`;
    }

    inPumbun.addEventListener('input', recalc);
    btnClear.addEventListener('click', () => {
      if (!inPumbun.value) return;
      if (!confirm('입력 내용을 비울까요?')) return;
      inPumbun.value = '';
      recalc();
    });
  </script>
</body>
</html>
