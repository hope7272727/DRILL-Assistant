<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DRILL Assistant — 코드 저장소</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/theme.js"></script>
</head>
<body class="flex h-screen overflow-hidden antialiased text-on-surface">
  <div id="app-shell"></div>

  <main id="app-main">
    <div class="p-lg flex flex-col gap-lg max-w-[1800px] mx-auto h-full w-full">

      <!-- Top bar -->
      <div class="flex justify-between items-center bg-surface p-md rounded-xl border border-outline-variant shadow-sm gap-md">
        <div class="flex items-center gap-md">
          <h2 class="font-h3 text-on-surface">코드 저장소</h2>
          <span id="count-chip" class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-sm">0개</span>
        </div>
        <div class="flex items-center gap-sm flex-1 max-w-[420px]">
          <div class="relative flex-1">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
            <input id="search-input" type="text" placeholder="품명 / 품번 / BR / 소재 / 비고 검색"
                   class="w-full pl-10 pr-4 py-2 bg-surface border border-outline-variant rounded-lg font-body-sm text-body-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"/>
          </div>
        </div>
        <div class="flex gap-sm">
          <button id="btn-select-all" class="px-3 py-2 border border-outline-variant text-on-surface rounded-lg font-label-md hover:bg-surface-variant transition-colors flex items-center gap-1 text-body-sm">
            <span class="material-symbols-outlined text-[18px]">check_box</span>
            전체 선택
          </button>
          <button id="btn-copy-selected" disabled class="px-3 py-2 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary-container disabled:opacity-40 disabled:cursor-not-allowed transition-colors flex items-center gap-1">
            <span class="material-symbols-outlined text-[18px]">content_copy</span>
            품명 / 품번 선택 복사 (<span id="sel-count">0</span>)
          </button>
          <a href="drill-code.html" class="px-4 py-2 border border-outline text-on-surface rounded-lg font-label-md hover:bg-surface-variant transition-colors flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">add</span>
            새 코드 만들기
          </a>
        </div>
      </div>

      <!-- Grid of saved cards -->
      <div id="grid" class="flex-1 overflow-y-auto pr-1">
        <div id="empty-state" class="flex flex-col items-center justify-center text-secondary text-center py-xl">
          <span class="material-symbols-outlined text-[64px] text-outline mb-2">bookmark_border</span>
          <p class="font-body-md">저장된 코드가 없습니다.</p>
          <p class="font-body-sm text-[12px] text-outline mt-1">"새 코드 만들기" 페이지에서 저장한 항목이 여기에 모입니다.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/shell.js"></script>
  <script src="assets/persist.js"></script>
  <script>
    renderShell('code-list');

    const SAVED_KEY = 'drill-code/library/v1';
    let entries = [];

    const grid = document.getElementById('grid');
    const emptyState = document.getElementById('empty-state');
    const countChip = document.getElementById('count-chip');
    const searchInput = document.getElementById('search-input');
    const btnSelectAll = document.getElementById('btn-select-all');
    const btnCopySelected = document.getElementById('btn-copy-selected');
    const selCountEl = document.getElementById('sel-count');

    // selectedKeys uses each entry's finish (assumed unique) as the identity.
    const selectedKeys = new Set();
    function entryKey(e) { return e.finish || JSON.stringify(e); }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;',
      }[c]));
    }

    function fmtTs(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    async function load() {
      const arr = await DrillPersist.get(SAVED_KEY);
      entries = Array.isArray(arr) ? arr : [];
      render();
    }

    function persist() {
      DrillPersist.set(SAVED_KEY, entries).catch(e => console.warn(e));
    }

    function render() {
      // Clear except empty-state
      Array.from(grid.children).forEach(c => { if (c !== emptyState) c.remove(); });
      countChip.textContent = entries.length + '개';

      const q = searchInput.value.trim().toLowerCase();
      const filtered = !q ? entries : entries.filter(e => {
        const hay = [e.pumbun, e.finish, e.brtip, e.material, e.danno, e.memo,
          e.outputs && e.outputs.초도, e.outputs && e.outputs.홈,
          e.outputs && e.outputs.단, e.outputs && e.outputs.센터]
          .filter(Boolean).join(' ').toLowerCase();
        return hay.includes(q);
      });

      if (entries.length === 0) {
        emptyState.style.display = '';
        return;
      }
      emptyState.style.display = 'none';

      const wrap = document.createElement('div');
      wrap.className = 'grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-md';
      grid.appendChild(wrap);

      if (filtered.length === 0) {
        const note = document.createElement('div');
        note.className = 'col-span-full text-center text-secondary py-lg';
        note.textContent = '검색어와 일치하는 항목이 없습니다.';
        wrap.appendChild(note);
        return;
      }

      for (const e of filtered) {
        const idx = entries.indexOf(e);
        const key = entryKey(e);
        const isSel = selectedKeys.has(key);
        const card = document.createElement('div');
        card.className = 'bg-surface-container-lowest border rounded-xl p-lg flex flex-col gap-2 hover:shadow-md transition-all '
          + (isSel ? 'border-primary ring-2 ring-primary/30' : 'border-outline-variant hover:border-primary');
        const out = e.outputs || {};
        const memoLine = e.memo
          ? `<p class="font-body-sm text-on-surface-variant text-[12px] whitespace-pre-wrap break-words mt-1">📝 ${escapeHtml(e.memo)}</p>`
          : '';
        const meta = [
          e.brtip ? `BR: ${escapeHtml(e.brtip)}` : '',
          e.material ? `소재: ${escapeHtml(e.material)}` : '',
          e.danno ? `단번호: ${escapeHtml(e.danno)}` : '',
        ].filter(Boolean).join(' · ');
        card.innerHTML = `
          <div class="flex justify-between items-start gap-2">
            <input type="checkbox" class="sel-cb mt-1 accent-primary rounded shrink-0" ${isSel ? 'checked' : ''}/>
            <div class="min-w-0 flex-1">
              <p class="font-label-md text-on-surface text-[14px] truncate" title="${escapeHtml(e.pumbun || '')}">${escapeHtml(e.pumbun || '(품명 없음)')}</p>
              <p class="font-code text-h3 text-primary truncate mt-0.5">${escapeHtml(e.finish || '')}</p>
            </div>
            <button class="del-btn text-secondary hover:text-error shrink-0" title="삭제">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          ${meta ? `<p class="font-body-sm text-secondary text-[12px]">${meta}</p>` : ''}
          <div class="grid grid-cols-2 gap-1 mt-1 font-code text-[12px]">
            <div><span class="text-secondary">최종</span> ${escapeHtml(out.최종 || '·')}</div>
            <div><span class="text-secondary">초도</span> ${escapeHtml(out.초도 || '·')}</div>
            <div><span class="text-secondary">홈</span> ${escapeHtml(out.홈 || '·')}</div>
            <div><span class="text-secondary">단</span> ${escapeHtml(out.단 || '·')}</div>
            <div class="col-span-2"><span class="text-secondary">센터</span> ${escapeHtml(out.센터 || '·')}</div>
          </div>
          ${memoLine}
          <div class="flex justify-between items-center mt-auto pt-2 border-t border-outline-variant">
            <span class="font-body-sm text-outline text-[11px]">${fmtTs(e.savedAt)}</span>
            <button class="open-btn px-3 py-1 border border-outline-variant rounded text-body-sm text-primary hover:bg-primary-fixed flex items-center gap-1">
              <span class="material-symbols-outlined text-[16px]">edit</span>
              불러오기
            </button>
          </div>`;
        card.querySelector('.del-btn').addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (!confirm(`"${e.finish || e.pumbun || ''}" 항목을 삭제할까요?`)) return;
          entries.splice(idx, 1);
          selectedKeys.delete(key);
          persist();
          render();
        });
        card.querySelector('.open-btn').addEventListener('click', (ev) => {
          ev.stopPropagation();
          sessionStorage.setItem('drill-code:loadEntry', JSON.stringify(e));
          location.href = 'drill-code.html';
        });
        const cb = card.querySelector('.sel-cb');
        cb.addEventListener('click', (ev) => ev.stopPropagation());
        cb.addEventListener('change', () => {
          if (cb.checked) selectedKeys.add(key);
          else selectedKeys.delete(key);
          card.classList.toggle('border-primary', cb.checked);
          card.classList.toggle('ring-2', cb.checked);
          card.classList.toggle('ring-primary/30', cb.checked);
          card.classList.toggle('border-outline-variant', !cb.checked);
          refreshSelectionUI();
        });
        wrap.appendChild(card);
      }
      refreshSelectionUI();
    }

    function refreshSelectionUI() {
      // Drop selections that are no longer present in entries.
      const validKeys = new Set(entries.map(entryKey));
      for (const k of Array.from(selectedKeys)) {
        if (!validKeys.has(k)) selectedKeys.delete(k);
      }
      selCountEl.textContent = String(selectedKeys.size);
      btnCopySelected.disabled = selectedKeys.size === 0;
    }

    btnSelectAll.addEventListener('click', () => {
      // Toggle: if everything visible is selected, clear; else select all.
      const all = entries.map(entryKey);
      const allSelected = all.length > 0 && all.every(k => selectedKeys.has(k));
      if (allSelected) selectedKeys.clear();
      else for (const k of all) selectedKeys.add(k);
      render();
    });

    btnCopySelected.addEventListener('click', () => {
      if (selectedKeys.size === 0) return;
      const lines = entries
        .filter(e => selectedKeys.has(entryKey(e)))
        .map(e => {
          const p = (e.pumbun || '').trim();
          const f = (e.finish || '').trim();
          return p ? `${p} / ${f}` : f;
        });
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        const span = btnCopySelected.querySelector('span:not(.material-symbols-outlined)');
        // Briefly flash count chip — keep it simple, just toggle text temporarily.
        const orig = btnCopySelected.innerHTML;
        btnCopySelected.innerHTML = '<span class="material-symbols-outlined text-[18px]">check</span> 복사됨!';
        setTimeout(() => { btnCopySelected.innerHTML = orig; refreshSelectionUI(); }, 1100);
      });
    });

    searchInput.addEventListener('input', render);

    load();
  </script>
</body>
</html>
