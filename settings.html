<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DRILL Assistant — 설정</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/theme.js"></script>
</head>
<body class="flex h-screen overflow-hidden antialiased text-on-surface">
  <div id="app-shell"></div>

  <main id="app-main">
    <div class="p-margin max-w-[960px] mx-auto">
      <h2 class="font-h2 text-h2 text-on-surface mb-xs">설정</h2>
      <p class="font-body-lg text-body-lg text-secondary mb-xl">앱 동작 방식, 통합, 사용자 환경을 관리합니다.</p>

      <div class="flex flex-col gap-lg">
        <!-- Profile -->
        <section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg">
          <h3 class="font-h3 text-[18px] text-on-surface mb-md flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary">account_circle</span>
            프로필
          </h3>
          <div class="grid grid-cols-2 gap-md">
            <div>
              <label class="font-label-md text-on-surface-variant block mb-1">이름</label>
              <input type="text" value="관리자" class="w-full px-3 py-2 border border-outline-variant rounded-lg bg-surface text-body-sm focus:outline-none focus:border-primary"/>
            </div>
            <div>
              <label class="font-label-md text-on-surface-variant block mb-1">이메일</label>
              <input type="email" value="admin@neotis.co.kr" class="w-full px-3 py-2 border border-outline-variant rounded-lg bg-surface text-body-sm focus:outline-none focus:border-primary"/>
            </div>
          </div>
        </section>

        <!-- ERP Integration -->
        <section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg">
          <h3 class="font-h3 text-[18px] text-on-surface mb-md flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary">link</span>
            ERP 연동
          </h3>
          <div class="grid grid-cols-2 gap-md">
            <div>
              <label class="font-label-md text-on-surface-variant block mb-1">ERP 엔드포인트</label>
              <input type="url" placeholder="https://erp.example.com/api" class="w-full px-3 py-2 border border-outline-variant rounded-lg bg-surface text-body-sm font-code focus:outline-none focus:border-primary"/>
            </div>
            <div>
              <label class="font-label-md text-on-surface-variant block mb-1">API 키</label>
              <input type="password" placeholder="••••••••••••••••" class="w-full px-3 py-2 border border-outline-variant rounded-lg bg-surface text-body-sm font-code focus:outline-none focus:border-primary"/>
            </div>
          </div>
          <div class="flex items-center gap-2 mt-md">
            <span class="w-2 h-2 rounded-full bg-outline"></span>
            <span class="font-body-sm text-secondary">미연결</span>
          </div>
        </section>

        <!-- Drill Point Defaults -->
        <section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg">
          <h3 class="font-h3 text-[18px] text-on-surface mb-md flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary">precision_manufacturing</span>
            드릴 포인트 기본값
          </h3>
          <div class="grid grid-cols-2 gap-md">
            <div>
              <label class="font-label-md text-on-surface-variant block mb-1">DXF 일치율 합격 기준 (%)</label>
              <input type="number" value="95" min="0" max="100" class="w-full px-3 py-2 border border-outline-variant rounded-lg bg-surface text-body-sm font-code focus:outline-none focus:border-primary"/>
            </div>
            <div>
              <label class="font-label-md text-on-surface-variant block mb-1">위치 오차 허용 (mm)</label>
              <input type="number" value="0.20" step="0.01" class="w-full px-3 py-2 border border-outline-variant rounded-lg bg-surface text-body-sm font-code focus:outline-none focus:border-primary"/>
            </div>
          </div>
        </section>

        <!-- Save -->
        <div class="flex justify-end gap-sm">
          <button class="px-4 py-2 border border-outline text-on-surface rounded-lg font-label-md hover:bg-surface-variant transition-colors">취소</button>
          <button class="px-4 py-2 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary-container transition-colors">저장</button>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/shell.js"></script>
  <script>renderShell('settings');</script>
</body>
</html>
