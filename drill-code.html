<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DRILL Assistant — 드릴 코드 생성</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/theme.js"></script>
</head>
<body class="flex h-screen overflow-hidden antialiased text-on-surface">
  <div id="app-shell"></div>

  <main id="app-main">
    <div class="p-lg flex flex-col gap-lg max-w-[1800px] mx-auto h-full w-full">

      <!-- Top bar -->
      <div class="flex justify-between items-center bg-surface p-md rounded-xl border border-outline-variant shadow-sm">
        <div class="flex items-center gap-md">
          <h2 class="font-h3 text-on-surface">드릴 코드 생성</h2>
          <span class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-sm">자동 채번</span>
        </div>
      </div>

      <!-- Main layout -->
      <div class="flex-1 grid grid-cols-12 gap-lg min-h-0">

        <!-- Left: input -->
        <div class="col-span-4 bg-surface p-lg rounded-xl border border-outline-variant shadow-sm flex flex-col gap-md overflow-y-auto">
          <h3 class="font-h3 text-[18px] text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary">edit_note</span>
            완제품 코드 입력
          </h3>

          <div>
            <label for="finished-code" class="font-label-md text-on-surface-variant block mb-1">완제품 코드</label>
            <input id="finished-code" type="text" placeholder="예: 1D0320C130" autocomplete="off" spellcheck="false"
                   class="w-full px-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-h3 font-code uppercase tracking-wider focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"/>
            <p class="font-body-sm text-secondary text-[12px] mt-2">완제품(최상위) 코드를 입력하세요. 이 코드 기준으로 하위 채번이 진행됩니다.</p>
          </div>

          <div id="parsed-summary" class="hidden bg-surface-container rounded-lg p-md border border-outline-variant">
            <p class="font-label-sm text-secondary mb-1">현재 입력</p>
            <p id="parsed-code" class="font-code text-h3 text-primary"></p>
          </div>
        </div>

        <!-- Right: future content (numbering tree, output, etc.) -->
        <div class="col-span-8 bg-surface p-lg rounded-xl border border-outline-variant shadow-sm flex flex-col items-center justify-center text-center text-secondary">
          <span class="material-symbols-outlined text-[64px] text-outline mb-2">account_tree</span>
          <p class="font-body-md">완제품 코드를 입력하면 채번 트리가 여기에 표시됩니다.</p>
          <p class="font-body-sm text-[12px] text-outline mt-1">(채번 로직은 다음 단계에서 추가됩니다.)</p>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/shell.js"></script>
  <script src="assets/persist.js"></script>
  <script>
    renderShell('drill-code');

    const finishedInput = document.getElementById('finished-code');
    const parsedSummary = document.getElementById('parsed-summary');
    const parsedCode = document.getElementById('parsed-code');

    function syncSummary() {
      const v = finishedInput.value.trim().toUpperCase();
      if (!v) {
        parsedSummary.classList.add('hidden');
        parsedCode.textContent = '';
        return;
      }
      parsedSummary.classList.remove('hidden');
      parsedCode.textContent = v;
    }

    finishedInput.addEventListener('input', () => {
      syncSummary();
      DrillPersist.setDebounced('drill-code/v1', () => ({
        finishedCode: finishedInput.value,
      }), 400);
    });

    // Restore previous input
    (async () => {
      try {
        const saved = await DrillPersist.get('drill-code/v1');
        if (saved && saved.finishedCode) {
          finishedInput.value = saved.finishedCode;
          syncSummary();
        }
      } catch (e) { console.warn(e); }
    })();
  </script>
</body>
</html>
