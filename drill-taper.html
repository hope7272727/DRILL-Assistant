<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DRILL Assistant — 드릴 테이퍼 취합</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="flex h-screen overflow-hidden antialiased text-on-surface">
  <div id="app-shell"></div>

  <main id="app-main">
    <div class="p-lg flex flex-col gap-lg max-w-[1800px] mx-auto h-full w-full">

      <!-- Top bar -->
      <div class="flex justify-between items-center bg-surface p-md rounded-xl border border-outline-variant shadow-sm">
        <div class="flex items-center gap-md">
          <h2 class="font-h3 text-on-surface">드릴 테이퍼 취합</h2>
          <span class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-sm">시트 통합</span>
        </div>
        <div class="flex gap-sm">
          <label class="px-4 py-2 border border-outline text-on-surface rounded-lg font-label-md hover:bg-surface-variant transition-colors flex items-center gap-2 cursor-pointer">
            <input id="file-input" type="file" accept=".xlsx,.xls,.csv" class="hidden"/>
            <span class="material-symbols-outlined text-[18px]">upload_file</span>
            엑셀 업로드
          </label>
          <button id="btn-download" disabled class="px-4 py-2 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary-container transition-colors flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
            <span class="material-symbols-outlined text-[18px]">download</span>
            통합 엑셀 다운로드
          </button>
        </div>
      </div>

      <!-- Main layout -->
      <div class="flex-1 grid grid-cols-12 gap-lg min-h-0">

        <!-- Left: sheet selection -->
        <div class="col-span-3 bg-surface p-md rounded-xl border border-outline-variant shadow-sm flex flex-col overflow-hidden">
          <div class="flex justify-between items-center mb-sm">
            <h3 class="font-label-md text-on-surface flex items-center gap-2">
              <span class="material-symbols-outlined text-[18px]">tab</span>
              시트 선택
            </h3>
            <span id="sheet-count" class="font-label-sm text-secondary">0</span>
          </div>
          <div id="sheet-list" class="flex-1 overflow-y-auto scrollbar-thin -mr-2 pr-2 flex flex-col gap-1">
            <div id="empty-sheets" class="text-center text-secondary text-body-sm p-lg">
              <span class="material-symbols-outlined text-[48px] text-outline mb-2 block">description</span>
              엑셀 파일을 업로드하세요.
            </div>
          </div>
          <div id="sheet-actions" class="hidden mt-2 flex gap-1">
            <button id="btn-select-all" class="flex-1 px-2 py-1 border border-outline-variant rounded text-body-sm text-secondary hover:bg-surface-variant">전체 선택</button>
            <button id="btn-select-none" class="flex-1 px-2 py-1 border border-outline-variant rounded text-body-sm text-secondary hover:bg-surface-variant">해제</button>
          </div>
        </div>

        <!-- Center: consolidated preview -->
        <div class="col-span-7 bg-surface p-md rounded-xl border border-outline-variant shadow-sm flex flex-col">
          <div class="flex justify-between items-center mb-md pb-md border-b border-outline-variant">
            <h3 class="font-label-md text-on-surface flex items-center gap-2">
              <span class="material-symbols-outlined text-[18px]">table_view</span>
              통합 미리보기
            </h3>
            <div id="preview-meta" class="font-label-sm text-secondary"></div>
          </div>
          <div id="preview-wrapper" class="flex-1 overflow-auto scrollbar-thin border border-outline-variant rounded-lg bg-surface-container-lowest">
            <div id="preview-empty" class="absolute inset-0 flex flex-col items-center justify-center text-secondary pointer-events-none" style="position:relative;padding:48px;">
              <span class="material-symbols-outlined text-[64px] text-outline mb-2">table_view</span>
              <p class="font-body-md">엑셀을 업로드하면 여기에 통합 결과가 표시됩니다.</p>
            </div>
            <table id="preview-table" class="w-full text-body-sm font-code hidden">
              <thead id="preview-thead" class="sticky top-0 bg-surface-container z-10"></thead>
              <tbody id="preview-tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- Right: settings -->
        <div class="col-span-2 bg-surface p-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-lg overflow-y-auto">
          <h3 class="font-label-md text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">settings</span>
            설정
          </h3>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">통합 시트 이름</label>
            <input id="out-sheet-name" type="text" value="최하" class="w-full px-2 py-2 border border-outline-variant rounded bg-surface-container-lowest text-body-sm focus:outline-none focus:border-primary"/>
          </div>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">저장 파일명</label>
            <input id="out-file-name" type="text" value="consolidated.xlsx" class="w-full px-2 py-2 border border-outline-variant rounded bg-surface-container-lowest text-body-sm font-code focus:outline-none focus:border-primary"/>
          </div>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">헤더 방식</label>
            <label class="flex items-center gap-2 font-body-sm text-on-surface mb-1">
              <input type="radio" name="header-mode" value="simple" checked class="accent-primary"/> MAX · MIN 반복
            </label>
            <label class="flex items-center gap-2 font-body-sm text-on-surface">
              <input type="radio" name="header-mode" value="prefixed" class="accent-primary"/> 시트명 포함 (A_MAX 등)
            </label>
          </div>

          <div>
            <label class="flex items-center gap-2 font-body-sm text-on-surface mt-2">
              <input id="include-sheet-row" type="checkbox" checked class="accent-primary rounded"/>
              시트명 상단 행 포함
            </label>
          </div>

          <div class="mt-auto bg-surface-container rounded-lg p-md border border-outline-variant">
            <p class="font-label-sm text-secondary mb-1">감지된 시트</p>
            <p id="detected-summary" class="font-body-sm text-on-surface text-[12px]">대기 중...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/shell.js"></script>
  <script>
    renderShell('drill-taper');

    // --- State ---
    const state = {
      workbook: null,
      fileName: '',
      // Detected data sheets: [{ name, rows: [[...]] , distCol, maxCol, minCol, startRow, numRows }]
      sheets: [],
      selected: new Set(), // sheet names
    };

    const $ = (id) => document.getElementById(id);
    const fileInput = $('file-input');
    const sheetList = $('sheet-list');
    const emptySheets = $('empty-sheets');
    const sheetCount = $('sheet-count');
    const sheetActions = $('sheet-actions');
    const btnSelectAll = $('btn-select-all');
    const btnSelectNone = $('btn-select-none');
    const previewTable = $('preview-table');
    const previewThead = $('preview-thead');
    const previewTbody = $('preview-tbody');
    const previewEmpty = $('preview-empty');
    const previewMeta = $('preview-meta');
    const btnDownload = $('btn-download');
    const outSheetName = $('out-sheet-name');
    const outFileName = $('out-file-name');
    const includeSheetRow = $('include-sheet-row');
    const detectedSummary = $('detected-summary');

    // --- File handling ---
    async function loadExcelFile(f) {
      if (!f) return;
      state.fileName = f.name;
      outFileName.value = f.name.replace(/\.[^.]+$/, '') + '_통합.xlsx';
      try {
        const buf = await f.arrayBuffer();
        const wb = XLSX.read(buf, { type: 'array' });
        state.workbook = wb;
        analyzeSheets();
        renderSheetList();
        buildPreview();
      } catch (err) {
        console.warn(err);
        alert('엑셀 파일을 읽을 수 없습니다: ' + err.message);
      }
    }

    fileInput.addEventListener('change', (e) => {
      const f = e.target.files && e.target.files[0];
      loadExcelFile(f);
      fileInput.value = '';
    });

    // Drag & drop anywhere on the page
    const dropOverlay = document.createElement('div');
    dropOverlay.className = 'fixed inset-0 z-50 hidden items-center justify-center pointer-events-none';
    dropOverlay.innerHTML = `
      <div class="absolute inset-0 bg-primary opacity-10"></div>
      <div class="relative bg-surface-container-lowest border-2 border-dashed border-primary rounded-xl px-xl py-lg flex items-center gap-md shadow-lg">
        <span class="material-symbols-outlined text-primary" style="font-size:32px;">upload_file</span>
        <span class="font-h3 text-h3 text-primary">엑셀 파일을 드롭하세요</span>
      </div>`;
    document.body.appendChild(dropOverlay);

    let dragDepth = 0;
    function isExcelDrag(dt) {
      if (!dt) return false;
      if (dt.types && Array.from(dt.types).includes('Files')) return true;
      return false;
    }
    window.addEventListener('dragenter', (e) => {
      if (!isExcelDrag(e.dataTransfer)) return;
      e.preventDefault();
      dragDepth++;
      dropOverlay.classList.remove('hidden');
      dropOverlay.classList.add('flex');
    });
    window.addEventListener('dragover', (e) => {
      if (!isExcelDrag(e.dataTransfer)) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });
    window.addEventListener('dragleave', (e) => {
      if (!isExcelDrag(e.dataTransfer)) return;
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) {
        dropOverlay.classList.add('hidden');
        dropOverlay.classList.remove('flex');
      }
    });
    window.addEventListener('drop', (e) => {
      e.preventDefault();
      dragDepth = 0;
      dropOverlay.classList.add('hidden');
      dropOverlay.classList.remove('flex');
      const files = e.dataTransfer && e.dataTransfer.files;
      if (!files || !files.length) return;
      const f = Array.from(files).find(x => /\.(xlsx|xls|csv)$/i.test(x.name));
      if (!f) {
        alert('엑셀 파일(.xlsx, .xls, .csv)만 업로드 가능합니다.');
        return;
      }
      loadExcelFile(f);
    });

    // Find DISTANCE/MAX/MIN columns in the first row of each sheet.
    function analyzeSheets() {
      const wb = state.workbook;
      state.sheets = [];
      state.selected = new Set();
      for (const name of wb.SheetNames) {
        const ws = wb.Sheets[name];
        if (!ws) continue;
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });
        if (!rows.length) continue;
        const header = rows[0] || [];
        const distCol = header.findIndex(v => String(v).trim().toUpperCase() === 'DISTANCE');
        const maxCol = header.findIndex(v => String(v).trim().toUpperCase() === 'MAX');
        const minCol = header.findIndex(v => String(v).trim().toUpperCase() === 'MIN');
        if (distCol < 0 || maxCol < 0 || minCol < 0) continue;
        // Collect numeric data from row 1 onward
        const data = [];
        for (let r = 1; r < rows.length; r++) {
          const row = rows[r] || [];
          const d = toNum(row[distCol]);
          if (d === null) continue; // skip blank rows
          const mx = toNum(row[maxCol]);
          const mn = toNum(row[minCol]);
          data.push({ d, mx, mn });
        }
        if (!data.length) continue;
        state.sheets.push({ name, distCol, maxCol, minCol, data });
        state.selected.add(name);
      }
      detectedSummary.textContent = state.sheets.length
        ? `${state.sheets.length}개 시트 감지: ${state.sheets.map(s => s.name).join(', ')}`
        : '적합한 시트를 찾지 못했습니다. (1행 헤더에 DISTANCE/MAX/MIN 필요)';
    }

    function toNum(v) {
      if (v === null || v === undefined || v === '') return null;
      const n = typeof v === 'number' ? v : parseFloat(v);
      return isNaN(n) ? null : n;
    }

    function renderSheetList() {
      // Wipe old children except empty state
      Array.from(sheetList.children).forEach(c => { if (c !== emptySheets) c.remove(); });
      const has = state.sheets.length > 0;
      emptySheets.style.display = has ? 'none' : 'block';
      sheetActions.classList.toggle('hidden', !has);
      sheetCount.textContent = state.sheets.length;
      if (!has) return;
      for (const s of state.sheets) {
        const row = document.createElement('label');
        row.className = 'flex items-center gap-2 p-2 rounded-lg border border-outline-variant hover:bg-surface-container cursor-pointer';
        const checked = state.selected.has(s.name);
        row.innerHTML = `
          <input type="checkbox" class="accent-primary rounded" ${checked ? 'checked' : ''}/>
          <div class="flex-1 min-w-0">
            <p class="font-label-md text-on-surface text-[13px] truncate">${s.name}</p>
            <p class="font-body-sm text-[11px] text-secondary">${s.data.length}개 행</p>
          </div>`;
        const cb = row.querySelector('input');
        cb.addEventListener('change', () => {
          if (cb.checked) state.selected.add(s.name); else state.selected.delete(s.name);
          buildPreview();
        });
        sheetList.appendChild(row);
      }
    }

    btnSelectAll.addEventListener('click', () => {
      state.sheets.forEach(s => state.selected.add(s.name));
      renderSheetList();
      buildPreview();
    });
    btnSelectNone.addEventListener('click', () => {
      state.selected.clear();
      renderSheetList();
      buildPreview();
    });

    // --- Build consolidated data (geometry-agnostic) ---
    function consolidate() {
      const sel = state.sheets.filter(s => state.selected.has(s.name));
      if (!sel.length) return null;
      const set = new Set();
      for (const s of sel) for (const r of s.data) set.add(r.d);
      const distances = Array.from(set).sort((a, b) => a - b);
      const lookup = new Map();
      for (const s of sel) {
        const m = new Map();
        for (const r of s.data) m.set(r.d, r);
        lookup.set(s.name, m);
      }
      const dataRows = [];
      for (const d of distances) {
        const out = [d];
        for (const s of sel) {
          const r = lookup.get(s.name).get(d);
          out.push(r ? r.mx : null, r ? r.mn : null);
        }
        dataRows.push(out);
      }
      return {
        sheets: sel,
        dataRows,
        headerMode: document.querySelector('input[name="header-mode"]:checked').value,
        twoRowHeader: includeSheetRow.checked,
      };
    }

    const TH_CLS = 'px-3 py-1.5 text-left border-b border-r border-outline-variant font-label-md text-on-surface-variant bg-surface-container last:border-r-0';
    const TD_CLS = 'px-3 py-1 border-b border-outline-variant text-on-surface';

    function buildPreview() {
      const result = consolidate();
      if (!result) {
        previewTable.classList.add('hidden');
        previewEmpty.style.display = 'flex';
        previewMeta.textContent = '';
        btnDownload.disabled = true;
        return;
      }
      previewEmpty.style.display = 'none';
      previewTable.classList.remove('hidden');
      btnDownload.disabled = false;
      previewMeta.textContent = `${result.sheets.length}개 시트 · ${result.dataRows.length}행 데이터`;

      previewThead.innerHTML = '';
      previewTbody.innerHTML = '';
      const { sheets: sel, dataRows, headerMode, twoRowHeader } = result;
      const maxLabel = (s) => headerMode === 'prefixed' ? s.name + '_MAX' : 'MAX';
      const minLabel = (s) => headerMode === 'prefixed' ? s.name + '_MIN' : 'MIN';

      if (twoRowHeader) {
        // Row 1: DISTANCE (rowspan=2) + sheet names (colspan=2 each)
        const tr1 = document.createElement('tr');
        const thDist = document.createElement('th');
        thDist.textContent = 'DISTANCE';
        thDist.rowSpan = 2;
        thDist.className = TH_CLS + ' text-center align-middle';
        tr1.appendChild(thDist);
        for (const s of sel) {
          const th = document.createElement('th');
          th.textContent = s.name;
          th.colSpan = 2;
          th.className = TH_CLS + ' text-center';
          tr1.appendChild(th);
        }
        previewThead.appendChild(tr1);
        // Row 2: MAX / MIN labels
        const tr2 = document.createElement('tr');
        for (const s of sel) {
          const tMax = document.createElement('th');
          tMax.textContent = maxLabel(s);
          tMax.className = TH_CLS + ' text-center';
          tr2.appendChild(tMax);
          const tMin = document.createElement('th');
          tMin.textContent = minLabel(s);
          tMin.className = TH_CLS + ' text-center';
          tr2.appendChild(tMin);
        }
        previewThead.appendChild(tr2);
      } else {
        const tr = document.createElement('tr');
        const thDist = document.createElement('th');
        thDist.textContent = 'DISTANCE';
        thDist.className = TH_CLS + ' text-center';
        tr.appendChild(thDist);
        for (const s of sel) {
          const tMax = document.createElement('th');
          tMax.textContent = maxLabel(s);
          tMax.className = TH_CLS + ' text-center';
          tr.appendChild(tMax);
          const tMin = document.createElement('th');
          tMin.textContent = minLabel(s);
          tMin.className = TH_CLS + ' text-center';
          tr.appendChild(tMin);
        }
        previewThead.appendChild(tr);
      }

      const maxRows = 300;
      const shown = dataRows.slice(0, maxRows);
      for (const r of shown) {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-surface-container';
        for (const v of r) {
          const td = document.createElement('td');
          td.textContent = v == null ? '' : (typeof v === 'number' ? (Math.round(v * 10000) / 10000) : v);
          td.className = TD_CLS;
          tr.appendChild(td);
        }
        previewTbody.appendChild(tr);
      }
      if (dataRows.length > maxRows) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 1 + sel.length * 2;
        td.className = 'px-3 py-2 text-center text-secondary text-body-sm';
        td.textContent = `… 나머지 ${dataRows.length - maxRows}행은 다운로드 파일에 포함됩니다.`;
        tr.appendChild(td);
        previewTbody.appendChild(tr);
      }
    }

    // Build the AOA + merges for xlsx export
    function buildExportAOA(result) {
      const { sheets: sel, dataRows, headerMode, twoRowHeader } = result;
      const maxLabel = (s) => headerMode === 'prefixed' ? s.name + '_MAX' : 'MAX';
      const minLabel = (s) => headerMode === 'prefixed' ? s.name + '_MIN' : 'MIN';
      const aoa = [];
      const merges = [];
      if (twoRowHeader) {
        const row0 = ['DISTANCE'];
        for (const s of sel) row0.push(s.name, '');
        aoa.push(row0);
        const row1 = [''];
        for (const s of sel) row1.push(maxLabel(s), minLabel(s));
        aoa.push(row1);
        merges.push({ s: { r: 0, c: 0 }, e: { r: 1, c: 0 } });
        let c = 1;
        for (const s of sel) {
          merges.push({ s: { r: 0, c }, e: { r: 0, c: c + 1 } });
          c += 2;
        }
      } else {
        const row = ['DISTANCE'];
        for (const s of sel) row.push(maxLabel(s), minLabel(s));
        aoa.push(row);
      }
      for (const r of dataRows) aoa.push(r);
      return { aoa, merges };
    }

    document.querySelectorAll('input[name="header-mode"]').forEach(el => el.addEventListener('change', buildPreview));
    includeSheetRow.addEventListener('change', buildPreview);

    btnDownload.addEventListener('click', () => {
      const result = consolidate();
      if (!result) return;
      const { aoa, merges } = buildExportAOA(result);
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      if (merges.length) ws['!merges'] = merges;
      const cols = [{ wch: 10 }];
      for (let i = 0; i < result.sheets.length; i++) cols.push({ wch: 9 }, { wch: 9 });
      ws['!cols'] = cols;
      const sheetName = (outSheetName.value || '통합').slice(0, 31);
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      const filename = (outFileName.value || 'consolidated.xlsx').replace(/\.xlsx?$/i, '') + '.xlsx';
      XLSX.writeFile(wb, filename);
    });
  </script>
</body>
</html>
