<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DRILL Assistant — 드릴 테이퍼 취합</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body class="flex h-screen overflow-hidden antialiased text-on-surface">
  <div id="app-shell"></div>

  <main id="app-main">
    <div class="p-lg flex flex-col gap-lg max-w-[1800px] mx-auto h-full w-full">

      <!-- Top bar -->
      <div class="flex justify-between items-center bg-surface p-md rounded-xl border border-outline-variant shadow-sm">
        <div class="flex items-center gap-md">
          <h2 class="font-h3 text-on-surface">드릴 테이퍼 취합</h2>
          <span class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-sm">시트 통합</span>
        </div>
        <div class="flex gap-sm">
          <label class="px-4 py-2 border border-outline text-on-surface rounded-lg font-label-md hover:bg-surface-variant transition-colors flex items-center gap-2 cursor-pointer">
            <input id="file-input" type="file" accept=".xlsx,.xls,.csv" class="hidden"/>
            <span class="material-symbols-outlined text-[18px]">upload_file</span>
            엑셀 업로드
          </label>
          <button id="btn-download" disabled class="px-4 py-2 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary-container transition-colors flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
            <span class="material-symbols-outlined text-[18px]">download</span>
            통합 엑셀 다운로드
          </button>
        </div>
      </div>

      <!-- Main layout -->
      <div class="flex-1 grid grid-cols-12 gap-lg min-h-0">

        <!-- Left: sheet selection -->
        <div class="col-span-2 bg-surface p-md rounded-xl border border-outline-variant shadow-sm flex flex-col overflow-hidden">
          <div class="flex justify-between items-center mb-sm">
            <h3 class="font-label-md text-on-surface flex items-center gap-2">
              <span class="material-symbols-outlined text-[18px]">tab</span>
              시트 선택
            </h3>
            <span id="sheet-count" class="font-label-sm text-secondary">0</span>
          </div>
          <div id="sheet-list" class="flex-1 overflow-y-auto scrollbar-thin -mr-2 pr-2 flex flex-col gap-1">
            <div id="empty-sheets" class="text-center text-secondary text-body-sm p-lg">
              <span class="material-symbols-outlined text-[48px] text-outline mb-2 block">description</span>
              엑셀 파일을 업로드하세요.
            </div>
          </div>
          <div id="sheet-actions" class="hidden mt-2 flex gap-1">
            <button id="btn-select-all" class="flex-1 px-2 py-1 border border-outline-variant rounded text-body-sm text-secondary hover:bg-surface-variant">전체 선택</button>
            <button id="btn-select-none" class="flex-1 px-2 py-1 border border-outline-variant rounded text-body-sm text-secondary hover:bg-surface-variant">해제</button>
          </div>
        </div>

        <!-- Center: consolidated preview + graph -->
        <div class="col-span-7 bg-surface p-md rounded-xl border border-outline-variant shadow-sm flex flex-col min-w-0">
          <div class="flex items-center mb-md pb-md border-b border-outline-variant gap-md">
            <div class="flex gap-1 bg-surface-container rounded-lg p-1">
              <button id="tab-table" class="px-3 py-1.5 bg-surface-container-lowest text-on-surface rounded font-label-sm shadow-sm flex items-center gap-1">
                <span class="material-symbols-outlined text-[18px]">table_view</span>
                통합 미리보기
              </button>
              <button id="tab-graph" class="px-3 py-1.5 text-secondary hover:text-on-surface rounded font-label-sm flex items-center gap-1">
                <span class="material-symbols-outlined text-[18px]">show_chart</span>
                그래프
              </button>
            </div>
            <div id="preview-meta" class="font-label-sm text-secondary ml-auto"></div>
            <button id="btn-chart-png" disabled class="px-3 py-1.5 border border-outline-variant rounded font-label-sm text-on-surface hover:bg-surface-variant disabled:opacity-40 hidden items-center gap-1">
              <span class="material-symbols-outlined text-[18px]">download</span>
              PNG 저장
            </button>
          </div>

          <!-- Table view -->
          <div id="view-table" class="flex-1 flex flex-col min-h-0">
            <div id="preview-scroll-top" class="overflow-x-auto overflow-y-hidden scrollbar-thin border border-outline-variant border-b-0 rounded-t-lg bg-surface-container-lowest hidden" style="height:14px;">
              <div id="preview-scroll-spacer" style="height:1px;"></div>
            </div>
            <div id="preview-wrapper" class="flex-1 overflow-auto scrollbar-thin border border-outline-variant rounded-lg bg-surface-container-lowest">
              <div id="preview-empty" class="flex flex-col items-center justify-center text-secondary pointer-events-none" style="padding:48px;">
                <span class="material-symbols-outlined text-[64px] text-outline mb-2">table_view</span>
                <p class="font-body-md">엑셀을 업로드하면 여기에 통합 결과가 표시됩니다.</p>
              </div>
              <table id="preview-table" class="text-body-sm font-code hidden" style="border-collapse:separate;border-spacing:0;table-layout:auto;">
                <thead id="preview-thead" class="sticky top-0 bg-surface-container z-10"></thead>
                <tbody id="preview-tbody"></tbody>
              </table>
            </div>
          </div>

          <!-- Graph view -->
          <div id="view-graph" class="flex-1 flex-col min-h-0 gap-md hidden">
            <div class="flex flex-wrap items-center gap-md mb-2 text-body-sm">
              <label class="flex items-center gap-1 text-on-surface">
                <input id="chart-show-max" type="checkbox" checked class="accent-primary rounded"/> MAX
              </label>
              <label class="flex items-center gap-1 text-on-surface">
                <input id="chart-show-min" type="checkbox" checked class="accent-primary rounded"/> MIN
              </label>
              <span class="text-outline">·</span>
              <label class="flex items-center gap-1 text-on-surface">
                X 범위
                <input id="chart-x-min" type="number" step="0.1" placeholder="auto" class="w-16 px-2 py-0.5 border border-outline-variant rounded bg-surface-container-lowest text-body-sm font-code"/>
                ~
                <input id="chart-x-max" type="number" step="0.1" placeholder="auto" class="w-16 px-2 py-0.5 border border-outline-variant rounded bg-surface-container-lowest text-body-sm font-code"/>
              </label>
              <label class="flex items-center gap-1 text-on-surface">
                Y 범위
                <input id="chart-y-min" type="number" step="0.01" placeholder="auto" class="w-20 px-2 py-0.5 border border-outline-variant rounded bg-surface-container-lowest text-body-sm font-code"/>
                ~
                <input id="chart-y-max" type="number" step="0.01" placeholder="auto" class="w-20 px-2 py-0.5 border border-outline-variant rounded bg-surface-container-lowest text-body-sm font-code"/>
              </label>
              <button id="btn-chart-reset" class="px-2 py-0.5 border border-outline-variant rounded text-secondary hover:bg-surface-variant text-body-sm">자동</button>
              <span class="text-outline">·</span>
              <span class="text-secondary text-[12px]">💡 그래프 클릭 → 그 위치의 모든 시트 값을 한 번에 편집</span>
            </div>
            <div class="flex-1 relative border border-outline-variant rounded-lg bg-surface-container-lowest p-md min-h-[400px]">
              <div id="chart-empty" class="absolute inset-0 flex flex-col items-center justify-center text-secondary pointer-events-none">
                <span class="material-symbols-outlined text-[64px] text-outline mb-2">show_chart</span>
                <p class="font-body-md">데이터를 업로드하면 그래프가 그려집니다.</p>
              </div>
              <canvas id="chart-canvas" class="hidden"></canvas>
            </div>
          </div>
        </div>

        <!-- Right: settings -->
        <div class="col-span-3 bg-surface p-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-lg overflow-y-auto">
          <h3 class="font-label-md text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">settings</span>
            설정
          </h3>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">통합 시트 이름</label>
            <input id="out-sheet-name" type="text" value="취합" class="w-full px-2 py-2 border border-outline-variant rounded bg-surface-container-lowest text-body-sm focus:outline-none focus:border-primary"/>
          </div>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">저장 방식</label>
            <label class="flex items-center gap-2 font-body-sm text-on-surface mb-1">
              <input type="radio" name="save-mode" value="with-source" checked class="accent-primary"/> 취합 + 원본 시트
            </label>
            <label class="flex items-center gap-2 font-body-sm text-on-surface">
              <input type="radio" name="save-mode" value="merged-only" class="accent-primary"/> 취합 시트만
            </label>
          </div>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">저장 파일명</label>
            <input id="out-file-name" type="text" value="consolidated.xlsx" class="w-full px-2 py-2 border border-outline-variant rounded bg-surface-container-lowest text-body-sm font-code focus:outline-none focus:border-primary"/>
          </div>

          <div>
            <label class="font-label-sm text-on-surface block mb-1">헤더 방식</label>
            <label class="flex items-center gap-2 font-body-sm text-on-surface mb-1">
              <input type="radio" name="header-mode" value="prefixed" checked class="accent-primary"/> 시트명 포함 (A_MAX 등)
            </label>
            <label class="flex items-center gap-2 font-body-sm text-on-surface">
              <input type="radio" name="header-mode" value="simple" class="accent-primary"/> MAX · MIN 반복
            </label>
          </div>

          <div>
            <label class="flex items-center gap-2 font-body-sm text-on-surface mt-2">
              <input id="include-sheet-row" type="checkbox" checked class="accent-primary rounded"/>
              시트명 상단 행 포함
            </label>
          </div>

          <div class="mt-auto bg-surface-container rounded-lg p-md border border-outline-variant">
            <p class="font-label-sm text-secondary mb-1">감지된 시트</p>
            <p id="detected-summary" class="font-body-sm text-on-surface text-[12px]">대기 중...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/shell.js"></script>
  <script>
    renderShell('drill-taper');

    // --- State ---
    const state = {
      workbook: null,
      fileName: '',
      // Detected data sheets: [{ name, rows: [[...]] , distCol, maxCol, minCol, startRow, numRows }]
      sheets: [],
      selected: new Set(), // sheet names
    };

    const $ = (id) => document.getElementById(id);
    const fileInput = $('file-input');
    const sheetList = $('sheet-list');
    const emptySheets = $('empty-sheets');
    const sheetCount = $('sheet-count');
    const sheetActions = $('sheet-actions');
    const btnSelectAll = $('btn-select-all');
    const btnSelectNone = $('btn-select-none');
    const previewTable = $('preview-table');
    const previewThead = $('preview-thead');
    const previewTbody = $('preview-tbody');
    const previewEmpty = $('preview-empty');
    const previewMeta = $('preview-meta');
    const btnDownload = $('btn-download');
    const outSheetName = $('out-sheet-name');
    const outFileName = $('out-file-name');
    const includeSheetRow = $('include-sheet-row');
    const detectedSummary = $('detected-summary');

    // --- File handling ---
    async function loadExcelFile(f) {
      if (!f) return;
      state.fileName = f.name;
      outFileName.value = f.name.replace(/\.[^.]+$/, '') + '_통합.xlsx';
      try {
        const buf = await f.arrayBuffer();
        const wb = XLSX.read(buf, { type: 'array' });
        state.workbook = wb;
        analyzeSheets();
        renderSheetList();
        buildPreview();
      } catch (err) {
        console.warn(err);
        alert('엑셀 파일을 읽을 수 없습니다: ' + err.message);
      }
    }

    fileInput.addEventListener('change', (e) => {
      const f = e.target.files && e.target.files[0];
      loadExcelFile(f);
      fileInput.value = '';
    });

    // Drag & drop anywhere on the page
    const dropOverlay = document.createElement('div');
    dropOverlay.className = 'fixed inset-0 z-50 hidden items-center justify-center pointer-events-none';
    dropOverlay.innerHTML = `
      <div class="absolute inset-0 bg-primary opacity-10"></div>
      <div class="relative bg-surface-container-lowest border-2 border-dashed border-primary rounded-xl px-xl py-lg flex items-center gap-md shadow-lg">
        <span class="material-symbols-outlined text-primary" style="font-size:32px;">upload_file</span>
        <span class="font-h3 text-h3 text-primary">엑셀 파일을 드롭하세요</span>
      </div>`;
    document.body.appendChild(dropOverlay);

    let dragDepth = 0;
    function isExcelDrag(dt) {
      if (!dt) return false;
      if (dt.types && Array.from(dt.types).includes('Files')) return true;
      return false;
    }
    window.addEventListener('dragenter', (e) => {
      if (!isExcelDrag(e.dataTransfer)) return;
      e.preventDefault();
      dragDepth++;
      dropOverlay.classList.remove('hidden');
      dropOverlay.classList.add('flex');
    });
    window.addEventListener('dragover', (e) => {
      if (!isExcelDrag(e.dataTransfer)) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });
    window.addEventListener('dragleave', (e) => {
      if (!isExcelDrag(e.dataTransfer)) return;
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) {
        dropOverlay.classList.add('hidden');
        dropOverlay.classList.remove('flex');
      }
    });
    window.addEventListener('drop', (e) => {
      e.preventDefault();
      dragDepth = 0;
      dropOverlay.classList.add('hidden');
      dropOverlay.classList.remove('flex');
      const files = e.dataTransfer && e.dataTransfer.files;
      if (!files || !files.length) return;
      const f = Array.from(files).find(x => /\.(xlsx|xls|csv)$/i.test(x.name));
      if (!f) {
        alert('엑셀 파일(.xlsx, .xls, .csv)만 업로드 가능합니다.');
        return;
      }
      loadExcelFile(f);
    });

    // Find DISTANCE/MAX/MIN columns in the first row of each sheet.
    function analyzeSheets() {
      const wb = state.workbook;
      state.sheets = [];
      state.selected = new Set();
      for (const name of wb.SheetNames) {
        const ws = wb.Sheets[name];
        if (!ws) continue;
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });
        if (!rows.length) continue;
        const header = rows[0] || [];
        const distCol = header.findIndex(v => String(v).trim().toUpperCase() === 'DISTANCE');
        const maxCol = header.findIndex(v => String(v).trim().toUpperCase() === 'MAX');
        const minCol = header.findIndex(v => String(v).trim().toUpperCase() === 'MIN');
        if (distCol < 0 || maxCol < 0 || minCol < 0) continue;
        // Collect numeric data from row 1 onward
        const data = [];
        for (let r = 1; r < rows.length; r++) {
          const row = rows[r] || [];
          const d = toNum(row[distCol]);
          if (d === null) continue; // skip blank rows
          const mx = toNum(row[maxCol]);
          const mn = toNum(row[minCol]);
          data.push({ d, mx, mn });
        }
        if (!data.length) continue;
        state.sheets.push({ name, distCol, maxCol, minCol, data });
        state.selected.add(name);
      }
      detectedSummary.textContent = state.sheets.length
        ? `${state.sheets.length}개 시트 감지: ${state.sheets.map(s => s.name).join(', ')}`
        : '적합한 시트를 찾지 못했습니다. (1행 헤더에 DISTANCE/MAX/MIN 필요)';
    }

    function toNum(v) {
      if (v === null || v === undefined || v === '') return null;
      const n = typeof v === 'number' ? v : parseFloat(v);
      return isNaN(n) ? null : n;
    }

    function renderSheetList() {
      // Wipe old children except empty state
      Array.from(sheetList.children).forEach(c => { if (c !== emptySheets) c.remove(); });
      const has = state.sheets.length > 0;
      emptySheets.style.display = has ? 'none' : 'block';
      sheetActions.classList.toggle('hidden', !has);
      sheetCount.textContent = state.sheets.length;
      if (!has) return;
      for (const s of state.sheets) {
        const row = document.createElement('label');
        row.className = 'flex items-center gap-2 p-2 rounded-lg border border-outline-variant hover:bg-surface-container cursor-pointer';
        const checked = state.selected.has(s.name);
        row.innerHTML = `
          <input type="checkbox" class="accent-primary rounded" ${checked ? 'checked' : ''}/>
          <div class="flex-1 min-w-0">
            <p class="font-label-md text-on-surface text-[13px] truncate">${s.name}</p>
            <p class="font-body-sm text-[11px] text-secondary">${s.data.length}개 행</p>
          </div>`;
        const cb = row.querySelector('input');
        cb.addEventListener('change', () => {
          if (cb.checked) state.selected.add(s.name); else state.selected.delete(s.name);
          buildPreview();
        });
        sheetList.appendChild(row);
      }
    }

    btnSelectAll.addEventListener('click', () => {
      state.sheets.forEach(s => state.selected.add(s.name));
      renderSheetList();
      buildPreview();
    });
    btnSelectNone.addEventListener('click', () => {
      state.selected.clear();
      renderSheetList();
      buildPreview();
    });

    // --- Build consolidated data (geometry-agnostic) ---
    function consolidate() {
      const sel = state.sheets.filter(s => state.selected.has(s.name));
      if (!sel.length) return null;
      const set = new Set();
      for (const s of sel) for (const r of s.data) set.add(r.d);
      const distances = Array.from(set).sort((a, b) => a - b);
      const lookup = new Map();
      for (const s of sel) {
        const m = new Map();
        for (const r of s.data) m.set(r.d, r);
        lookup.set(s.name, m);
      }
      const dataRows = [];
      for (const d of distances) {
        const out = [d];
        for (const s of sel) {
          const r = lookup.get(s.name).get(d);
          out.push(r ? r.mx : null, r ? r.mn : null);
        }
        dataRows.push(out);
      }
      return {
        sheets: sel,
        dataRows,
        headerMode: document.querySelector('input[name="header-mode"]:checked').value,
        twoRowHeader: includeSheetRow.checked,
      };
    }

    const TH_CLS = 'px-3 py-1.5 text-left border-b border-r border-outline-variant font-label-md text-on-surface-variant bg-surface-container last:border-r-0 whitespace-nowrap';
    const TD_CLS = 'px-3 py-1 border-b border-outline-variant text-on-surface whitespace-nowrap';

    const previewScrollTop = $('preview-scroll-top');
    const previewScrollSpacer = $('preview-scroll-spacer');
    const previewWrapper = $('preview-wrapper');

    // --- Tabs ---
    const tabTable = $('tab-table');
    const tabGraph = $('tab-graph');
    const viewTable = $('view-table');
    const viewGraph = $('view-graph');
    const btnChartPng = $('btn-chart-png');
    function activateTab(name) {
      const isTable = name === 'table';
      tabTable.classList.toggle('bg-surface-container-lowest', isTable);
      tabTable.classList.toggle('text-on-surface', isTable);
      tabTable.classList.toggle('shadow-sm', isTable);
      tabTable.classList.toggle('text-secondary', !isTable);
      tabGraph.classList.toggle('bg-surface-container-lowest', !isTable);
      tabGraph.classList.toggle('text-on-surface', !isTable);
      tabGraph.classList.toggle('shadow-sm', !isTable);
      tabGraph.classList.toggle('text-secondary', isTable);
      viewTable.classList.toggle('hidden', !isTable);
      viewGraph.classList.toggle('hidden', isTable);
      viewGraph.classList.toggle('flex', !isTable);
      btnChartPng.classList.toggle('hidden', isTable);
      btnChartPng.classList.toggle('flex', !isTable);
      if (!isTable) {
        rebuildChart();
      }
    }
    tabTable.addEventListener('click', () => activateTab('table'));
    tabGraph.addEventListener('click', () => activateTab('graph'));

    let _suppressScroll = false;
    previewScrollTop.addEventListener('scroll', () => {
      if (_suppressScroll) return;
      _suppressScroll = true;
      previewWrapper.scrollLeft = previewScrollTop.scrollLeft;
      _suppressScroll = false;
    });
    previewWrapper.addEventListener('scroll', () => {
      if (_suppressScroll) return;
      _suppressScroll = true;
      previewScrollTop.scrollLeft = previewWrapper.scrollLeft;
      _suppressScroll = false;
    });
    function syncTopScrollWidth() {
      const w = previewTable.classList.contains('hidden') ? 0 : previewTable.scrollWidth;
      if (w > 0) {
        previewScrollSpacer.style.width = w + 'px';
        previewScrollTop.classList.remove('hidden');
      } else {
        previewScrollTop.classList.add('hidden');
      }
    }
    window.addEventListener('resize', syncTopScrollWidth);

    function buildPreview() {
      rebuildChart(); // keep chart in sync
      const result = consolidate();
      if (!result) {
        previewTable.classList.add('hidden');
        previewEmpty.style.display = 'flex';
        previewMeta.textContent = '';
        btnDownload.disabled = true;
        syncTopScrollWidth();
        return;
      }
      previewEmpty.style.display = 'none';
      previewTable.classList.remove('hidden');
      btnDownload.disabled = false;
      previewMeta.textContent = `${result.sheets.length}개 시트 · ${result.dataRows.length}행 데이터`;

      previewThead.innerHTML = '';
      previewTbody.innerHTML = '';
      const { sheets: sel, dataRows, headerMode, twoRowHeader } = result;
      const maxLabel = (s) => headerMode === 'prefixed' ? s.name + '_MAX' : 'MAX';
      const minLabel = (s) => headerMode === 'prefixed' ? s.name + '_MIN' : 'MIN';

      if (twoRowHeader) {
        // Row 1: blank (above DISTANCE) + sheet names (colspan=2 each)
        const tr1 = document.createElement('tr');
        const thBlank = document.createElement('th');
        thBlank.textContent = '';
        thBlank.className = TH_CLS;
        tr1.appendChild(thBlank);
        for (const s of sel) {
          const th = document.createElement('th');
          th.textContent = s.name;
          th.colSpan = 2;
          th.className = TH_CLS + ' text-center';
          tr1.appendChild(th);
        }
        previewThead.appendChild(tr1);
        // Row 2: DISTANCE + MAX / MIN labels
        const tr2 = document.createElement('tr');
        const thDist = document.createElement('th');
        thDist.textContent = 'DISTANCE';
        thDist.className = TH_CLS + ' text-center';

        for (const s of sel) {

          tMax.textContent = maxLabel(s);
          tMax.className = TH_CLS + ' text-center';
          tr2.appendChild(tMax);
          const tMin = document.createElement('th');
          tMin.textContent = minLabel(s);
          tMin.className = TH_CLS + ' text-center';
          tr2.appendChild(tMin);
        }
        previewThead.appendChild(tr2);
      } else {
        const tr = document.createElement('tr');
        const thDist = document.createElement('th');
        thDist.textContent = 'DISTANCE';
        thDist.className = TH_CLS + ' text-center';
        tr.appendChild(thDist);
        for (const s of sel) {
          const tMax = document.createElement('th');
          tMax.textContent = maxLabel(s);
          tMax.className = TH_CLS + ' text-center';
          tr.appendChild(tMax);
          const tMin = document.createElement('th');
          tMin.textContent = minLabel(s);
          tMin.className = TH_CLS + ' text-center';
          tr.appendChild(tMin);
        }
        previewThead.appendChild(tr);
      }

      const maxRows = 300;
      const shown = dataRows.slice(0, maxRows);
      for (const r of shown) {
        const tr = document.createElement('tr');

        for (const v of r) {

          td.className = TD_CLS;

      }

        const tr = document.createElement('tr');

        td.textContent = `… 나머지 ${dataRows.length - maxRows}행은 다운로드 파일에 포함됩니다.`;
        tr.appendChild(td);
        previewTbody.appendChild(tr);

      // Wait one frame so layout is settled before measuring scroll width.
      requestAnimationFrame(syncTopScrollWidth);

    // Build the AOA + merges for xlsx export
    function buildExportAOA(result) {
      const { sheets: sel, dataRows, headerMode, twoRowHeader } = result;
      const maxLabel = (s) => headerMode === 'prefixed' ? s.name + '_MAX' : 'MAX';
      const minLabel = (s) => headerMode === 'prefixed' ? s.name + '_MIN' : 'MIN';
      const aoa = [];
      const merges = [];
      if (twoRowHeader) {
        const row0 = [''];
        for (const s of sel) row0.push(s.name, '');
        aoa.push(row0);
        const row1 = ['DISTANCE'];
        for (const s of sel) row1.push(maxLabel(s), minLabel(s));
        aoa.push(row1);
        // Merge each sheet name horizontally; DISTANCE stays in its own row.
        let c = 1;
        for (const s of sel) {
          merges.push({ s: { r: 0, c }, e: { r: 0, c: c + 1 } });
          c += 2;
        }
      } else {
        const row = ['DISTANCE'];
        for (const s of sel) row.push(maxLabel(s), minLabel(s));
        aoa.push(row);
      }
      for (const r of dataRows) aoa.push(r);
      return { aoa, merges };
    }

    document.querySelectorAll('input[name="header-mode"]').forEach(el => el.addEventListener('change', buildPreview));
    includeSheetRow.addEventListener('change', buildPreview);

    // ===== Chart =====
    const SHEET_COLORS = [
      '#e53935', '#fb8c00', '#43a047', '#1e88e5',
      '#5e35b1', '#d81b60', '#00acc1', '#fdd835',
      '#6d4c41', '#546e7a', '#7cb342', '#039be5',
      '#f4511e', '#ab47bc', '#0097a7', '#c0ca33',
    ];
    let chart = null;
    const chartCanvas = $('chart-canvas');
    const chartEmpty = $('chart-empty');
    const chartShowMax = $('chart-show-max');
    const chartShowMin = $('chart-show-min');
    const chartXMin = $('chart-x-min');
    const chartXMax = $('chart-x-max');
    const chartYMin = $('chart-y-min');
    const chartYMax = $('chart-y-max');
    const btnChartReset = $('btn-chart-reset');

    function rebuildChart() {
      if (viewGraph.classList.contains('hidden')) return; // only when active
      const result = consolidate();
      if (!result || !result.dataRows.length) {
        if (chart) { chart.destroy(); chart = null; }
        chartCanvas.classList.add('hidden');
        chartEmpty.classList.remove('hidden');
        btnChartPng.disabled = true;
        return;
      }
      chartEmpty.classList.add('hidden');
      chartCanvas.classList.remove('hidden');
      btnChartPng.disabled = false;

      const sheets = result.sheets;
      const labels = result.dataRows.map(r => r[0]);
      const showMax = chartShowMax.checked;
      const showMin = chartShowMin.checked;
      const datasets = [];
      sheets.forEach((s, i) => {
        const color = SHEET_COLORS[i % SHEET_COLORS.length];
        if (showMax) {
          datasets.push({
            label: s.name + ' MAX',
            data: result.dataRows.map(r => r[1 + i * 2]),
            borderColor: color,
            backgroundColor: color,
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHitRadius: 8,
            tension: 0,
            spanGaps: true,
            meta: { sheetName: s.name, type: 'max' },
          });
        }
        if (showMin) {
          datasets.push({
            label: s.name + ' MIN',
            data: result.dataRows.map(r => r[1 + i * 2 + 1]),
            borderColor: color,
            backgroundColor: color,
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHitRadius: 6,
            tension: 0,
            spanGaps: true,
            meta: { sheetName: s.name, type: 'min' },
          });
        }
      });

      const xMin = chartXMin.value === '' ? undefined : parseFloat(chartXMin.value);
      const xMax = chartXMax.value === '' ? undefined : parseFloat(chartXMax.value);
      const yMin = chartYMin.value === '' ? undefined : parseFloat(chartYMin.value);
      const yMax = chartYMax.value === '' ? undefined : parseFloat(chartYMax.value);

      const config = {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { intersect: false, mode: 'nearest', axis: 'x' },
          plugins: {
            legend: {
              position: 'bottom',
              labels: { boxWidth: 14, boxHeight: 8, font: { size: 11 } },
            },
            tooltip: { enabled: true },
          },
          scales: {
            x: {
              title: { display: true, text: 'DISTANCE' },
              ticks: { autoSkip: true, maxTicksLimit: 24 },
              min: xMin, max: xMax,
            },
            y: {
              title: { display: true, text: 'MAX / MIN' },
              min: yMin, max: yMax,
            },
          },
        },
      };

      if (chart) {
        chart.data = config.data;
        chart.options = config.options;
        chart.update();
      } else {
        chart = new Chart(chartCanvas.getContext('2d'), config);
      }
    }

    [chartShowMax, chartShowMin, chartXMin, chartXMax, chartYMin, chartYMax].forEach(el => {
      el.addEventListener('change', rebuildChart);
      if (el.tagName === 'INPUT' && el.type === 'number') {
        el.addEventListener('input', () => { /* defer */ });
      }
    });
    btnChartReset.addEventListener('click', () => {
      chartXMin.value = ''; chartXMax.value = '';
      chartYMin.value = ''; chartYMax.value = '';
      rebuildChart();
    });
    btnChartPng.addEventListener('click', () => {
      if (!chart) return;
      const url = chart.toBase64Image('image/png', 1);
      const a = document.createElement('a');
      a.href = url;
      a.download = (outFileName.value || 'chart').replace(/\.xlsx?$/i, '') + '_그래프.png';
      a.click();

    // Click anywhere along an x-position to open a multi-series edit modal.
    chartCanvas.addEventListener('click', (ev) => {
      if (!chart) return;
      const points = chart.getElementsAtEventForMode(ev, 'index', { axis: 'x', intersect: false }, false);
      if (!points.length) return;
      const xIdx = points[0].index;
      const distance = chart.data.labels[xIdx];
      openEditModal(distance, xIdx);
    });

    // Build a modal lazily on first use.
    let editModal = null;
    function ensureEditModal() {
      if (editModal) return editModal;
      const wrap = document.createElement('div');
      wrap.id = 'edit-modal';
      wrap.className = 'fixed inset-0 z-50 hidden items-center justify-center';
      wrap.innerHTML = `
        <div class="absolute inset-0 bg-black opacity-30" data-close="1"></div>
        <div class="relative bg-surface-container-lowest rounded-xl border border-outline-variant shadow-xl w-[360px] max-h-[85vh] flex flex-col">
          <div class="p-md border-b border-outline-variant flex justify-between items-center">
            <h3 class="font-h3 text-[18px] text-on-surface">DISTANCE <span id="em-distance" class="font-code text-primary"></span> 값 편집</h3>
            <button class="text-secondary hover:text-on-surface" data-close="1">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <div class="p-md flex-1 overflow-y-auto" id="em-body"></div>
          <div class="p-md border-t border-outline-variant flex justify-end gap-2">
            <button id="em-cancel" class="px-4 py-2 border border-outline-variant text-on-surface rounded-lg font-label-md hover:bg-surface-variant">취소</button>
            <button id="em-save" class="px-4 py-2 bg-primary text-on-primary rounded-lg font-label-md hover:bg-primary-container">저장</button>
          </div>
        </div>`;
      document.body.appendChild(wrap);
      wrap.addEventListener('click', (e) => {
        if (e.target.dataset && e.target.dataset.close === '1') closeEditModal();
      });
      wrap.querySelector('#em-cancel').addEventListener('click', closeEditModal);
      editModal = wrap;
      return wrap;
    }
    function closeEditModal() {
      if (!editModal) return;
      editModal.classList.add('hidden');
      editModal.classList.remove('flex');
    }

    function openEditModal(distance, xIdx) {
      const result = consolidate();
      if (!result) return;
      const wrap = ensureEditModal();
      wrap.querySelector('#em-distance').textContent = distance;
      const body = wrap.querySelector('#em-body');
      body.innerHTML = '';

      // Header row labelling MAX / MIN columns.
      const headerRow = document.createElement('div');
      headerRow.className = 'grid grid-cols-[100px_88px_88px] gap-2 items-center mb-1 font-label-md text-secondary text-[12px]';
      headerRow.innerHTML = `
        <div></div>
        <div class="text-center">MAX</div>
        <div class="text-center">MIN</div>`;
      body.appendChild(headerRow);

      const inputs = [];
      result.sheets.forEach((s, i) => {
        const max = result.dataRows[xIdx][1 + i * 2];
        const min = result.dataRows[xIdx][1 + i * 2 + 1];
        const color = SHEET_COLORS[i % SHEET_COLORS.length];
        const row = document.createElement('div');
        row.className = 'grid grid-cols-[100px_88px_88px] gap-2 items-center mb-1.5';
        row.innerHTML = `
          <div class="flex items-center gap-2 font-label-md text-on-surface text-[13px]">
            <span style="display:inline-block;width:10px;height:10px;background:${color};border-radius:2px;"></span>
            ${s.name}
          </div>
          <input data-sheet="${s.name}" data-type="max" type="number" step="0.0001" value="${max == null ? '' : max}" class="px-2 py-1 border border-outline-variant rounded bg-surface text-body-sm font-code text-center focus:outline-none focus:border-primary"/>
          <input data-sheet="${s.name}" data-type="min" type="number" step="0.0001" value="${min == null ? '' : min}" class="px-2 py-1 border border-outline-variant rounded bg-surface text-body-sm font-code text-center focus:outline-none focus:border-primary"/>`;
        body.appendChild(row);
        inputs.push(...row.querySelectorAll('input'));
      });
      const hint = document.createElement('p');
      hint.className = 'font-body-sm text-secondary text-[11px] mt-2';
      hint.textContent = '값을 비우면 그 점이 삭제되어 라인이 양옆을 잇습니다.';
      body.appendChild(hint);

      const saveBtn = wrap.querySelector('#em-save');
      saveBtn.onclick = () => {
        for (const inp of inputs) {
          const sheetName = inp.dataset.sheet;
          const type = inp.dataset.type;
          const str = inp.value.trim();
          const sheet = state.sheets.find(s => s.name === sheetName);
          if (!sheet) continue;
          const record = sheet.data.find(r => Math.abs(r.d - distance) < 1e-9);
          if (!record) continue;
          let v;
          if (str === '') v = null;
          else {
            const num = parseFloat(str);
            if (isNaN(num)) continue;
            v = num;
          }
          if (type === 'max') record.mx = v;
          else record.mn = v;
        }
        buildPreview();
        closeEditModal();
      };

      wrap.classList.remove('hidden');
      wrap.classList.add('flex');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && editModal && !editModal.classList.contains('hidden')) closeEditModal();
    });

    // Build a one-off chart on an offscreen canvas to embed in xlsx,
    // independent of whether the graph tab is currently visible.
    async function buildChartPng(result, opts) {
      opts = opts || {};
      const w = opts.width || 1600;
      const h = opts.height || 600;
      const off = document.createElement('canvas');
      off.width = w; off.height = h;
      const labels = result.dataRows.map(r => r[0]);
      const datasets = [];
      result.sheets.forEach((s, i) => {
        const color = SHEET_COLORS[i % SHEET_COLORS.length];
        datasets.push({
          label: s.name + ' MAX',
          data: result.dataRows.map(r => r[1 + i * 2]),
          borderColor: color, backgroundColor: color,
          borderWidth: 1.5, pointRadius: 0, tension: 0, spanGaps: true,
        });
        datasets.push({
          label: s.name + ' MIN',
          data: result.dataRows.map(r => r[1 + i * 2 + 1]),
          borderColor: color, backgroundColor: color,
          borderWidth: 1.5, pointRadius: 0, tension: 0, spanGaps: true,
        });
      });
      const tempChart = new Chart(off.getContext('2d'), {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: false,
          animation: false,
          plugins: {
            legend: { position: 'bottom', labels: { boxWidth: 14, boxHeight: 8, font: { size: 11 } } },
          },
          scales: {
            x: { title: { display: true, text: 'DISTANCE' }, ticks: { autoSkip: true, maxTicksLimit: 30 } },
            y: { title: { display: true, text: 'MAX / MIN' } },
          },
        },
      });
      await new Promise(r => requestAnimationFrame(r));
      const dataUrl = tempChart.toBase64Image('image/png', 1);
      tempChart.destroy();
      return { dataUrl, width: w, height: h };
    }

    btnDownload.addEventListener('click', async () => {
      const result = consolidate();
      if (!result) return;
      const { aoa, merges } = buildExportAOA(result);
      const sheetName = (outSheetName.value || '취합').slice(0, 31);
      const filename = (outFileName.value || 'consolidated.xlsx').replace(/\.xlsx?$/i, '') + '.xlsx';
      const saveMode = (document.querySelector('input[name="save-mode"]:checked') || {}).value || 'merged-only';

      btnDownload.disabled = true;
      try {
        const wb = new ExcelJS.Workbook();
        const ws = wb.addWorksheet(sheetName);
        aoa.forEach(row => ws.addRow(row));
        for (const m of merges) {
          ws.mergeCells(m.s.r + 1, m.s.c + 1, m.e.r + 1, m.e.c + 1);
        }
        ws.getColumn(1).width = 10;
        for (let i = 0; i < result.sheets.length; i++) {
          ws.getColumn(2 + i * 2).width = 10;
          ws.getColumn(3 + i * 2).width = 10;
        }

        if (saveMode === 'with-source' && state.workbook) {
          for (const s of result.sheets) {
            const origWs = state.workbook.Sheets[s.name];
            if (!origWs) continue;
            const safeName = s.name.slice(0, 31);
            const exWs = wb.addWorksheet(safeName);
            const rows = XLSX.utils.sheet_to_json(origWs, { header: 1, defval: null, raw: true });
            rows.forEach(r => exWs.addRow(r));
          }
        }

        // ExcelJS doesn't write charts, so write the data workbook then
        // post-process the zip to inject a native (data-linked) chart.
        const baseBuf = await wb.xlsx.writeBuffer();
        const buf = await injectNativeChart(baseBuf, {
          sheetName,
          numSheets: result.sheets.length,
          numDataRows: result.dataRows.length,
          twoRowHeader: result.twoRowHeader,
          sheetNames: result.sheets.map(s => s.name),
        });
        const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        console.error(err);
        alert('다운로드 실패: ' + err.message);
      } finally {
        btnDownload.disabled = false;
      }
    });

    // ===== Native Excel chart injection =====
    const CHART_COLORS = [
      'E53935','FB8C00','43A047','1E88E5','5E35B1','D81B60','00ACC1','FDD835',
      '6D4C41','546E7A','7CB342','039BE5','F4511E','AB47BC','0097A7','C0CA33',
    ];

    function xmlEscape(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&apos;');
    }
    function colLetter(c) {
      let s = '';
      c++;
      while (c > 0) {
        const m = (c - 1) % 26;
        s = String.fromCharCode(65 + m) + s;
        c = Math.floor((c - 1) / 26);
      }
      return s;
    }
    function quoteSheetForFormula(name) {
      // Excel formulas need single-quoted sheet names if the name contains
      // anything other than letters/digits/underscore, or starts with a digit.
      if (/^[A-Za-z_][A-Za-z0-9_]*$/.test(name)) return name;
      return "'" + name.replace(/'/g, "''") + "'";
    }

    function buildChartXml(opts) {
      const { sheetName, numSheets, numDataRows, twoRowHeader, sheetNames } = opts;
      const dataStart = twoRowHeader ? 3 : 2;
      const dataEnd = dataStart + numDataRows - 1;
      const sn = quoteSheetForFormula(sheetName);
      const distRange = `${sn}!$A$${dataStart}:$A$${dataEnd}`;

      let series = '';
      let colIdx = 1; // column B for first sheet's MAX
      for (let i = 0; i < numSheets; i++) {
        const sheetLabel = sheetNames[i];
        const colMax = colLetter(colIdx);
        const colMin = colLetter(colIdx + 1);
        const colorMax = CHART_COLORS[(i * 2) % CHART_COLORS.length];
        const colorMin = CHART_COLORS[(i * 2 + 1) % CHART_COLORS.length];
        // Use the same colour for MAX and MIN of the same sheet
        const sheetColor = CHART_COLORS[i % CHART_COLORS.length];
        const valRangeMax = `${sn}!$${colMax}$${dataStart}:$${colMax}$${dataEnd}`;
        const valRangeMin = `${sn}!$${colMin}$${dataStart}:$${colMin}$${dataEnd}`;
        const labelMax = `${sheetLabel} MAX`;
        const labelMin = `${sheetLabel} MIN`;

        series += `
          <c:ser>
            <c:idx val="${i * 2}"/>
            <c:order val="${i * 2}"/>
            <c:tx><c:v>${xmlEscape(labelMax)}</c:v></c:tx>
            <c:spPr>
              <a:ln w="19050"><a:solidFill><a:srgbClr val="${sheetColor}"/></a:solidFill></a:ln>
            </c:spPr>
            <c:marker><c:symbol val="none"/></c:marker>
            <c:cat><c:numRef><c:f>${xmlEscape(distRange)}</c:f></c:numRef></c:cat>
            <c:val><c:numRef><c:f>${xmlEscape(valRangeMax)}</c:f></c:numRef></c:val>
            <c:smooth val="0"/>
          </c:ser>
          <c:ser>
            <c:idx val="${i * 2 + 1}"/>
            <c:order val="${i * 2 + 1}"/>
            <c:tx><c:v>${xmlEscape(labelMin)}</c:v></c:tx>
            <c:spPr>
              <a:ln w="19050"><a:solidFill><a:srgbClr val="${sheetColor}"/></a:solidFill></a:ln>
            </c:spPr>
            <c:marker><c:symbol val="none"/></c:marker>
            <c:cat><c:numRef><c:f>${xmlEscape(distRange)}</c:f></c:numRef></c:cat>
            <c:val><c:numRef><c:f>${xmlEscape(valRangeMin)}</c:f></c:numRef></c:val>
            <c:smooth val="0"/>
          </c:ser>`;
        colIdx += 2;
      }

      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<c:chartSpace xmlns:c="http://schemas.openxmlformats.org/drawingml/2006/chart" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <c:chart>
    <c:autoTitleDeleted val="1"/>
    <c:plotArea>
      <c:layout/>
      <c:lineChart>
        <c:grouping val="standard"/>
        <c:varyColors val="0"/>${series}
        <c:marker val="0"/>
        <c:axId val="100"/>
        <c:axId val="200"/>
      </c:lineChart>
      <c:catAx>
        <c:axId val="100"/>
        <c:scaling><c:orientation val="minMax"/></c:scaling>
        <c:delete val="0"/>
        <c:axPos val="b"/>
        <c:crossAx val="200"/>
      </c:catAx>
      <c:valAx>
        <c:axId val="200"/>
        <c:scaling><c:orientation val="minMax"/></c:scaling>
        <c:delete val="0"/>
        <c:axPos val="l"/>
        <c:crossAx val="100"/>
      </c:valAx>
    </c:plotArea>
    <c:legend>
      <c:legendPos val="b"/>
      <c:overlay val="0"/>
    </c:legend>
    <c:plotVisOnly val="1"/>
    <c:dispBlanksAs val="gap"/>
  </c:chart>
</c:chartSpace>`;
    }

    function buildDrawingXml(numCols) {
      const startCol = numCols + 1; // one blank column gap
      const endCol = startCol + 16;
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<xdr:wsDr xmlns:xdr="http://schemas.openxmlformats.org/drawingml/2006/spreadsheetDrawing" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:c="http://schemas.openxmlformats.org/drawingml/2006/chart">
  <xdr:twoCellAnchor editAs="oneCell">
    <xdr:from><xdr:col>${startCol}</xdr:col><xdr:colOff>0</xdr:colOff><xdr:row>0</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:from>
    <xdr:to><xdr:col>${endCol}</xdr:col><xdr:colOff>0</xdr:colOff><xdr:row>28</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:to>
    <xdr:graphicFrame macro="">
      <xdr:nvGraphicFramePr>
        <xdr:cNvPr id="2" name="Chart 1"/>
        <xdr:cNvGraphicFramePr/>
      </xdr:nvGraphicFramePr>
      <xdr:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/></xdr:xfrm>
      <a:graphic>
        <a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/chart">
          <c:chart r:id="rId1"/>
        </a:graphicData>
      </a:graphic>
    </xdr:graphicFrame>
    <xdr:clientData/>
  </xdr:twoCellAnchor>
</xdr:wsDr>`;
    }

    function buildDrawingRels() {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/chart" Target="../charts/chart1.xml"/>
</Relationships>`;
    }

    // Add a new Relationship to an existing rels file (or create one).
    function addRelationship(existingXml, type, target) {
      // Find existing rIds, pick a free one
      const ids = [];
      const re = /Id="rId(\d+)"/g;
      let m;
      while ((m = re.exec(existingXml || '')) !== null) ids.push(parseInt(m[1], 10));
      const newId = (ids.length ? Math.max(...ids) : 0) + 1;
      const rel = `  <Relationship Id="rId${newId}" Type="${type}" Target="${target}"/>\n`;
      if (existingXml && /Relationships/.test(existingXml)) {
        return { xml: existingXml.replace(/<\/Relationships>/, rel + '</Relationships>'), id: 'rId' + newId };
      }
      const xml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
${rel}</Relationships>`;
      return { xml, id: 'rId' + newId };
    }

    function injectDrawingRefIntoSheet(sheetXml, rId) {
      // Insert <drawing r:id="..."/> just before </worksheet>.
      // Watch out: the worksheet XML may already have a <drawing> tag (it shouldn't).
      if (/<drawing\b/.test(sheetXml)) return sheetXml; // skip if present
      return sheetXml.replace(/<\/worksheet>/, `<drawing r:id="${rId}"/></worksheet>`);
    }

    function ensureContentTypes(ctXml, parts) {
      // parts: [{ part, contentType }]
      let xml = ctXml;
      for (const p of parts) {
        if (xml.includes('PartName="' + p.part + '"')) continue;
        const rel = `<Override PartName="${p.part}" ContentType="${p.contentType}"/>`;
        xml = xml.replace(/<\/Types>/, rel + '</Types>');
      }
      return xml;
    }

    async function injectNativeChart(buffer, opts) {
      const zip = await JSZip.loadAsync(buffer);

      const wbXml = await zip.file('xl/workbook.xml').async('text');
      const sheetEntries = [];
      const tagRe = /<sheet\s+([^>]+?)\/>/g;
      let m;
      while ((m = tagRe.exec(wbXml)) !== null) {
        const attrs = {};
        const attrRe = /([A-Za-z_][A-Za-z0-9_:]*)\s*=\s*"([^"]*)"/g;
        let am;
        while ((am = attrRe.exec(m[1])) !== null) attrs[am[1]] = am[2];
        sheetEntries.push({
          name: attrs.name,
          sheetId: attrs.sheetId,
          rId: attrs['r:id'] || attrs['r:Id'] || attrs.id,
        });
      }
      if (!sheetEntries.length) throw new Error('워크북에서 시트 목록을 읽지 못했습니다.');

      const wbRels = await zip.file('xl/_rels/workbook.xml.rels').async('text');
      const targetMap = {};
      const relRe = /<Relationship\b([^>]+)\/>/g;
      let rm;
      while ((rm = relRe.exec(wbRels)) !== null) {
        const attrs = {};
        const attrRe = /([A-Za-z_][A-Za-z0-9_:]*)\s*=\s*"([^"]*)"/g;
        let am;
        while ((am = attrRe.exec(rm[1])) !== null) attrs[am[1]] = am[2];
        if (attrs.Id && attrs.Target) targetMap[attrs.Id] = attrs.Target;
      }

      const targetEntry = sheetEntries.find(s => s.name === opts.sheetName);
      if (!targetEntry) {
        const known = sheetEntries.map(s => s.name).join(', ');
        throw new Error(`통합 시트("${opts.sheetName}")를 찾지 못했습니다. 워크북 시트: ${known}`);
      }
      const sheetTarget = targetMap[targetEntry.rId];
      if (!sheetTarget) throw new Error('워크북 관계를 찾지 못했습니다.');
      const sheetXmlPath = sheetTarget.startsWith('/') ? sheetTarget.slice(1) : 'xl/' + sheetTarget;
      const sheetBaseName = sheetXmlPath.split('/').pop().replace('.xml', '');
      const sheetRelsPath = `xl/worksheets/_rels/${sheetBaseName}.xml.rels`;

      // Add chart and drawing files
      const numCols = 1 + opts.numSheets * 2;
      zip.file('xl/charts/chart1.xml', buildChartXml(opts));
      zip.file('xl/drawings/drawing1.xml', buildDrawingXml(numCols));
      zip.file('xl/drawings/_rels/drawing1.xml.rels', buildDrawingRels());

      // Update sheet rels: add a relationship to the new drawing
      let existingRels = '';
      const relsFile = zip.file(sheetRelsPath);
      if (relsFile) existingRels = await relsFile.async('text');
      const addedRel = addRelationship(
        existingRels,
        'http://schemas.openxmlformats.org/officeDocument/2006/relationships/drawing',
        '../drawings/drawing1.xml'
      );
      zip.file(sheetRelsPath, addedRel.xml);

      // Update sheet xml to reference the drawing
      let sheetXml = await zip.file(sheetXmlPath).async('text');
      sheetXml = injectDrawingRefIntoSheet(sheetXml, addedRel.id);
      zip.file(sheetXmlPath, sheetXml);

      // Update [Content_Types].xml
      const ctPath = '[Content_Types].xml';
      let ctXml = await zip.file(ctPath).async('text');
      ctXml = ensureContentTypes(ctXml, [
        { part: '/xl/charts/chart1.xml', contentType: 'application/vnd.openxmlformats-officedocument.drawingml.chart+xml' },
        { part: '/xl/drawings/drawing1.xml', contentType: 'application/vnd.openxmlformats-officedocument.drawing+xml' },
      ]);
      zip.file(ctPath, ctXml);

      return zip.generateAsync({ type: 'arraybuffer' });
    }
  </script>
